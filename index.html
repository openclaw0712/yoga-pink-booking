<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九容瑜伽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #ffe4ec 0%, #ffcce0 50%, #ffb3cc 100%);
            min-height: 100vh;
            color: #5c3a45;
        }
        .header {
            background: linear-gradient(135deg, #ff9eb5 0%, #ff85a2 50%, #ff6b8f 100%);
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 105, 143, 0.3);
        }
        .header h1 { font-size: 32px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header p { font-size: 15px; color: #fff5f7; margin-top: 5px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav button {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #ff9eb5;
            border-radius: 25px;
            color: #d63384;
            font-weight: 600;
            cursor: pointer;
        }
        .nav button.active {
            background: #ff6b8f;
            color: white;
            border-color: #ff6b8f;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(214, 51, 132, 0.15);
            border: 2px solid rgba(255, 158, 181, 0.3);
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #d63384; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffb8d1;
            border-radius: 15px;
            font-size: 16px;
            background: #fffafc;
        }
        .form-group input:focus { outline: none; border-color: #ff6b8f; }
        
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b8f 0%, #e85a7e 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 143, 0.4);
        }
        
        .course-card {
            padding: 18px;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4ec 100%);
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 5px solid #ff6b8f;
        }
        .course-card .name { font-size: 18px; font-weight: 700; color: #d63384; }
        .course-card .info { font-size: 14px; color: #8b5a6b; margin: 5px 0; }
        .course-card .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .course-card .capacity { 
            background: #ffe4ec; color: #d63384; padding: 5px 12px; border-radius: 20px; font-size: 14px;
        }
        .course-card .capacity.full { background: #ffebf0; color: #c62828; }
        .course-card button {
            background: #ff6b8f; color: white; border: none; padding: 10px 25px;
            border-radius: 20px; font-weight: 600;
        }
        .course-card button:disabled { background: #ccc; }
        
        .booking-card {
            padding: 15px;
            background: #fff5f8;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #ffb8d1;
        }
        .booking-card .date { font-weight: 700; color: #d63384; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tabs button {
            flex: 1; padding: 10px; background: #ffe4ec; border: none;
            border-radius: 10px; color: #d63384; font-weight: 600;
        }
        .tabs button.active { background: #ff6b8f; color: white; }
        
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid #ffe4ec;
        }
        .member-item button { background: #ff6b8f; color: white; border: none; padding: 8px 15px; border-radius: 15px; }
        
        .error { color: #c62828; text-align: center; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧘 九容瑜伽</h1>
        <p>動若雲，靜若水，身隨意，境隨心。</p>
    </div>
    
    <div class="container">
        <!-- 導航 -->
        <div class="nav" id="mainNav" style="display:none">
            <button class="active" data-tab="courses">課程</button>
            <button data-tab="my">我的</button>
        </div>
        
        <!-- 登入/註冊 -->
        <div id="tab-login">
            <div class="card">
                <h2 style="text-align:center;color:#d63384;margin-bottom:20px">🔐 會員登入</h2>
                <div class="form-group">
                    <label>手機</label>
                    <input type="tel" id="loginPhone" placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPw" placeholder="密碼">
                </div>
                <div class="form-group" style="display:flex;align-items:center">
                    <input type="checkbox" id="rememberMe" style="width:auto;margin-right:8px">
                    <label style="margin:0">記住登入</label>
                </div>
                <button class="btn-primary" onclick="doLogin()">登入</button>
                <p id="loginError" class="error"></p>
                <p style="text-align:center;margin-top:15px">
                    還沒帳號？<a href="#" onclick="showRegister();return false" style="color:#d63384">立即註冊</a>
                </p>
            </div>
            
            <div class="card" id="registerCard" style="display:none">
                <h2 style="text-align:center;color:#d63384;margin-bottom:20px">✨ 註冊會員</h2>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label>手機</label>
                    <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPw" placeholder="設定密碼">
                </div>
                <button class="btn-primary" onclick="doRegister()">註冊</button>
                <p id="regError" class="error"></p>
                <p style="text-align:center;margin-top:15px">
                    已有帳號？<a href="#" onclick="showLogin();return false" style="color:#d63384">立即登入</a>
                </p>
            </div>
            
            <div class="card" style="text-align:center">
                <p style="color:#8b5a6b">老師專區</p>
                <button onclick="showTeacherLogin()" style="background:transparent;border:2px solid #ff6b8f;color:#ff6b8f;padding:12px 30px;border-radius:25px;margin-top:10px;font-weight:600">老師入口</button>
            </div>
        </div>
        
        <!-- 課程列表 -->
        <div id="tab-courses" class="hidden">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
                    <h2 style="color:#d63384">📅 每週課程</h2>
                    <button onclick="logout()" style="background:#ff6b8f;color:white;border:none;padding:8px 15px;border-radius:15px">登出</button>
                </div>
                <div id="courseList"></div>
            </div>
        </div>
        
        <!-- 我的預約 -->
        <div id="tab-my" class="hidden">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
                    <h2 style="color:#d63384">📋 我的預約</h2>
                    <button onclick="logout()" style="background:#ff6b8f;color:white;border:none;padding:8px 15px;border-radius:15px">登出</button>
                </div>
                <div id="myBookingList"></div>
            </div>
        </div>
        
        <!-- 老師登入 -->
        <div id="tab-teacher-login" class="hidden">
            <div class="card">
                <h2 style="text-align:center;color:#d63384;margin-bottom:20px">👩‍🏫 老師登入</h2>
                <div class="form-group">
                    <label>帳號</label>
                    <input type="text" id="teacherId" value="teacher">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="teacherPw">
                </div>
                <button class="btn-primary" onclick="doTeacherLogin()">登入</button>
                <button onclick="showLoginTab()" style="background:#ccc;border:none;padding:12px;border-radius:25px;width:100%;margin-top:10px">返回</button>
            </div>
        </div>
        
        <!-- 老師後台 -->
        <div id="tab-teacher" class="hidden">
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
                    <h2 style="color:#d63384">👩‍🏫 老師後台</h2>
                    <button onclick="logout()" style="background:#ff6b8f;color:white;border:none;padding:8px 15px;border-radius:15px">登出</button>
                </div>
                
                <div class="tabs">
                    <button class="active" onclick="showTeacherTab('members')">會員</button>
                    <button onclick="showTeacherTab('bookings')">預約</button>
                </div>
                
                <div id="teacherMembers"></div>
                <div id="teacherBookings" class="hidden"></div>
            </div>
        </div>
    </div>

<script>
var users = [], bookings = [], courses = [], currentUser = null;

function init() {
    loadData();
    checkAutoLogin();
}

function loadData() {
    try {
        users = JSON.parse(localStorage.getItem('yoga_users')) || [];
        bookings = JSON.parse(localStorage.getItem('yoga_bookings')) || [];
        courses = JSON.parse(localStorage.getItem('yoga_courses')) || [];
        if (!courses.length) {
            courses = [{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00',capacity:8}];
            saveData();
        }
    } catch(e) {
        courses = [{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00',capacity:8}];
    }
}

function saveData() {
    localStorage.setItem('yoga_users', JSON.stringify(users));
    localStorage.setItem('yoga_bookings', JSON.stringify(bookings));
    localStorage.setItem('yoga_courses', JSON.stringify(courses));
}

function showTab(tab) {
    document.getElementById('tab-login').classList.add('hidden');
    document.getElementById('tab-courses').classList.add('hidden');
    document.getElementById('tab-my').classList.add('hidden');
    document.getElementById('tab-teacher-login').classList.add('hidden');
    document.getElementById('tab-teacher').classList.add('hidden');
    document.getElementById('tab-' + tab).classList.remove('hidden');
}

function showLoginTab() {
    document.getElementById('mainNav').style.display = 'none';
    showTab('login');
}

function showMemberUI() {
    document.getElementById('mainNav').style.display = 'flex';
    var nav = document.getElementById('mainNav');
    nav.innerHTML = '<button class="active" onclick="showTab(\'courses\');this.classList.add(\'active\')">課程</button><button onclick="showTab(\'my\');this.classList.add(\'active\')">我的</button>';
    showTab('courses');
    renderCourses();
}

function showTeacherLogin() {
    showTab('teacher-login');
}

function showTeacherTab(tab) {
    document.querySelectorAll('.tabs button').forEach(function(b,i) {
        b.classList.toggle('active', (tab==='members' && i===0) || (tab==='bookings' && i===1));
    });
    document.getElementById('teacherMembers').classList.toggle('hidden', tab !== 'members');
    document.getElementById('teacherBookings').classList.toggle('hidden', tab !== 'bookings');
}

function showRegister() {
    document.getElementById('registerCard').style.display = 'block';
}

function showLogin() {
    document.getElementById('registerCard').style.display = 'none';
}

function doRegister() {
    var name = document.getElementById('regName').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var pw = document.getElementById('regPw').value;
    
    if (!name || !phone || !pw) {
        document.getElementById('regError').innerText = '請填寫完整';
        return;
    }
    if (users.some(function(u){return u.phone === phone})) {
        document.getElementById('regError').innerText = '此手機已註冊';
        return;
    }
    
    users.push({id:Date.now(),name:name,phone:phone,pw:pw});
    saveData();
    alert('註冊成功！請登入');
    showLogin();
}

function doLogin() {
    var phone = document.getElementById('loginPhone').value.trim();
    var pw = document.getElementById('loginPw').value;
    var remember = document.getElementById('rememberMe').checked;
    
    var user = users.find(function(u){return u.phone === phone && u.pw === pw});
    if (user) {
        currentUser = user;
        if (remember) {
            localStorage.setItem('yoga_current_user', JSON.stringify(user));
        }
        showMemberUI();
    } else {
        document.getElementById('loginError').innerText = '帳號或密碼錯誤';
    }
}

function checkAutoLogin() {
    var saved = localStorage.getItem('yoga_current_user');
    if (saved) {
        try {
            var user = JSON.parse(saved);
            if (users.some(function(u){return u.id === user.id})) {
                currentUser = user;
                showMemberUI();
                return;
            }
        } catch(e) {}
    }
    showLoginTab();
}

function logout() {
    currentUser = null;
    localStorage.removeItem('yoga_current_user');
    showLoginTab();
}

function doTeacherLogin() {
    var id = document.getElementById('teacherId').value;
    var pw = document.getElementById('teacherPw').value;
    
    if (id === 'teacher' && pw === 'yoga9527') {
        renderTeacherUI();
        showTab('teacher');
    } else {
        alert('帳號或密碼錯誤');
    }
}

function getNextFriday() {
    var d = new Date();
    while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
    return d.toISOString().split('T')[0];
}

function renderCourses() {
    var date = getNextFriday();
    var html = '';
    courses.forEach(function(c) {
        var booked = bookings.filter(function(b){return b.courseId===c.id && b.date===date && b.status!=='cancelled'}).length;
        var remain = c.capacity - booked;
        var disabled = remain <= 0 ? 'disabled' : '';
        
        html += '<div class="course-card">';
        html += '<div class="name">' + c.name + '</div>';
        html += '<div class="info">👩‍🏫 ' + c.teacher + ' | ⏰ ' + c.time + '</div>';
        html += '<div class="bottom">';
        html += '<span class="capacity ' + (remain<=0?'full':'') + '">名額 ' + remain + '/' + c.capacity + '</span>';
        html += '<button ' + disabled + ' onclick="quickBook(' + c.id + ')">預約</button>';
        html += '</div></div>';
    });
    document.getElementById('courseList').innerHTML = html;
}

function quickBook(courseId) {
    var course = courses.find(function(c){return c.id === courseId});
    var date = getNextFriday();
    
    if (bookings.some(function(b){return b.phone===currentUser.phone && b.courseId===courseId && b.date===date && b.status!=='cancelled'})) {
        alert('您已預約過');
        return;
    }
    
    var booked = bookings.filter(function(b){return b.courseId===courseId && b.date===date && b.status!=='cancelled'}).length;
    if (booked >= course.capacity) {
        alert('名額已滿');
        return;
    }
    
    bookings.push({
        id:Date.now(),
        courseId:courseId,
        courseName:course.name,
        teacher:course.teacher,
        date:date,
        time:course.time,
        name:currentUser.name,
        phone:currentUser.phone,
        status:'confirmed'
    });
    saveData();
    alert('預約成功！');
    renderCourses();
    renderMyBookings();
}

function renderMyBookings() {
    var my = bookings.filter(function(b){return b.phone === currentUser.phone}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var html = '';
    if (!my.length) {
        html = '<p style="text-align:center;color:#8b5a6b">尚無預約</p>';
    } else {
        my.forEach(function(b) {
            if (b.status !== 'cancelled') {
                html += '<div class="booking-card">';
                html += '<div class="date">📅 ' + b.date + ' ' + b.time + '</div>';
                html += '<div>' + b.courseName + ' - ' + b.teacher + '</div>';
                html += '<button onclick="cancelBooking(' + b.id + ')" style="background:#ff6b8f;color:white;border:none;padding:8px 15px;border-radius:15px;margin-top:10px">取消預約</button>';
                html += '</div>';
            }
        });
    }
    document.getElementById('myBookingList').innerHTML = html;
}

function cancelBooking(id) {
    if (confirm('確定取消？')) {
        var b = bookings.find(function(x){return x.id === id});
        if (b) { b.status = 'cancelled'; saveData(); renderMyBookings(); renderCourses(); }
    }
}

function renderTeacherUI() {
    // 會員
    var mhtml = '';
    if (!users.length) {
        mhtml = '<p style="text-align:center;color:#8b5a6b">尚無會員</p>';
    } else {
        users.forEach(function(u) {
            mhtml += '<div class="member-item">';
            mhtml += '<span><b>' + u.name + '</b> (' + u.phone + ')</span>';
            mhtml += '<button onclick="deleteMember(' + u.id + ')">刪除</button>';
            mhtml += '</div>';
        });
    }
    document.getElementById('teacherMembers').innerHTML = mhtml;
    
    // 預約
    var bhtml = '';
    var all = bookings.filter(function(b){return b.status !== 'cancelled'}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    if (!all.length) {
        bhtml = '<p style="text-align:center;color:#8b5a6b">尚無預約</p>';
    } else {
        all.forEach(function(b) {
            bhtml += '<div class="booking-card">';
            bhtml += '<div class="date">📅 ' + b.date + ' ' + b.time + '</div>';
            bhtml += '<div><b>' + b.name + '</b> (' + b.phone + ')</div>';
            bhtml += '<div>' + b.courseName + ' - ' + b.teacher + '</div>';
            bhtml += '<button onclick="deleteBooking(' + b.id + ')" style="background:#ff6b8f;color:white;border:none;padding:8px 15px;border-radius:15px;margin-top:10px">刪除</button>';
            bhtml += '</div>';
        });
    }
    document.getElementById('teacherBookings').innerHTML = bhtml;
}

function deleteMember(id) {
    if (confirm('刪除此會員？')) {
        var u = users.find(function(x){return x.id === id});
        users = users.filter(function(x){return x.id !== id});
        bookings = bookings.filter(function(b){return b.phone !== u.phone});
        saveData();
        renderTeacherUI();
    }
}

function deleteBooking(id) {
    if (confirm('刪除此預約？')) {
        bookings = bookings.filter(function(b){return b.id !== id});
        saveData();
        renderTeacherUI();
    }
}

init();
</script>
</body>
</html>
