<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 瑜伽預約 - Pink Yoga</title>
    <style>
        :root {
            --primary: #ff8fab;
            --primary-dark: #fb6f92;
            --secondary: #ffc2d1;
            --bg: #ffe5ec;
            --white: #fff0f3;
            --text: #590d22;
            --text-light: #a4133c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ff8fab 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; color: var(--text); margin-bottom: 10px; }
        .header p { color: var(--text-light); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 15px; background: rgba(255,255,255,0.6);
            border: none; border-radius: 15px; font-size: 16px; font-weight: 600;
            color: var(--text); cursor: pointer; transition: all 0.3s;
        }
        .tab.active {
            background: var(--primary); color: white;
            box-shadow: 0 5px 20px rgba(251, 111, 146, 0.4);
        }
        .card {
            background: white; border-radius: 25px; padding: 30px;
            box-shadow: 0 15px 40px rgba(164, 19, 60, 0.15);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 500; }
        input, select, textarea {
            width: 100%; padding: 14px 18px; border: 2px solid var(--secondary);
            border-radius: 12px; font-size: 16px; transition: all 0.3s;
            background: var(--white);
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 143, 171, 0.2);
        }
        button {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; border-radius: 12px; font-size: 18px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(251, 111, 146, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(251, 111, 146, 0.5);
        }
        .success { display: none; text-align: center; padding: 30px; }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .success h2 { color: var(--primary-dark); margin-bottom: 10px; }
        .bookings-table { width: 100%; border-collapse: collapse; }
        .bookings-table th, .bookings-table td {
            padding: 12px; text-align: left; border-bottom: 1px solid var(--secondary);
        }
        .bookings-table th { color: var(--text-light); font-weight: 600; }
        .bookings-table tr:hover { background: var(--white); }
        .status {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.confirmed { background: #d4edda; color: #155724; }
        .status.completed { background: #d1ecf1; color: #0c5460; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary-dark); }
        .stat-label { font-size: 12px; color: var(--text-light); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-light); }
        
        /* 登入畫面 */
        .login-screen { text-align: center; padding: 40px; }
        .login-screen h2 { color: var(--text); margin-bottom: 20px; }
        
        /* 課程管理 */
        .course-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--white); border-radius: 12px; margin-bottom: 10px;
            border: 2px solid var(--secondary);
        }
        .course-info { flex: 1; }
        .course-name { font-weight: 600; color: var(--text); }
        .course-detail { font-size: 14px; color: var(--text-light); }
        .course-actions { display: flex; gap: 8px; }
        .course-actions button { width: auto; padding: 8px 12px; font-size: 14px; }
        .btn-edit { background: var(--secondary); }
        .btn-delete { background: #ff6b6b; }
        .btn-add { background: var(--primary-dark); margin-bottom: 15px; }
        
        /* 密碼錯誤 */
        .error { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 瑜伽預約</h1>
            <p>預約屬於你的放鬆時光</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('book')">預約</button>
            <button class="tab" onclick="showLogin()">管理</button>
        </div>
        
        <!-- 預約表單 -->
        <div id="book" class="tab-content active">
            <div class="card">
                <form id="bookingForm">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" required placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>電話</label>
                        <input type="tel" name="phone" required placeholder="請輸入電話">
                    </div>
                    <div class="form-group">
                        <label>LINE ID（選填）</label>
                        <input type="text" name="line" placeholder="方便聯繫">
                    </div>
                    <div class="form-group">
                        <label>選擇課程</label>
                        <select name="course" id="courseSelect" required>
                            <option value="">請選擇課程</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>選擇日期</label>
                        <input type="date" name="date" id="datePicker" required>
                    </div>
                    <div class="form-group">
                        <label>選擇時段</label>
                        <select name="time" required>
                            <option value="">請選擇時段</option>
                            <option value="15:00">🌅 下午 3:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>備註</label>
                        <textarea name="note" rows="3" placeholder="有任何特殊需求嗎？"></textarea>
                    </div>
                    <button type="submit">🌸 確認預約</button>
                </form>
                
                <div class="success" id="successMessage">
                    <div class="success-icon">🎉</div>
                    <h2>預約成功！</h2>
                    <p>我們會盡快與您聯繫確認</p>
                </div>
            </div>
        </div>
        
        <!-- 管理登入 -->
        <div id="login" class="tab-content">
            <div class="card">
                <div class="login-screen">
                    <h2>🔐 管理登入</h2>
                    <input type="password" id="adminPassword" placeholder="請輸入密碼" maxlength="4">
                    <button onclick="checkPassword()" style="margin-top: 15px;">登入</button>
                    <p class="error" id="loginError">密碼錯誤，請重試</p>
                </div>
            </div>
        </div>
        
        <!-- 管理後台 -->
        <div id="manage" class="tab-content">
            <div class="card">
                <button class="btn-add" onclick="showAddCourse()">➕ 新增課程</button>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalBookings">0</div>
                        <div class="stat-label">總預約</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="todayBookings">0</div>
                        <div class="stat-label">今日預約</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="weekBookings">0</div>
                        <div class="stat-label">本週預約</div>
                    </div>
                </div>
                
                <h3 style="margin: 20px 0 10px; color: var(--text);">📚 課程列表</h3>
                <div id="courseList"></div>
                
                <h3 style="margin: 30px 0 10px; color: var(--text);">📋 預約紀錄</h3>
                <div class="form-group">
                    <input type="text" id="searchInput" placeholder="🔍 搜尋預約..." oninput="renderBookings()">
                </div>
                <table class="bookings-table">
                    <thead>
                        <tr>
                            <th>日期</th><th>姓名</th><th>課程</th><th>時間</th><th>狀態</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable"></tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <p>目前沒有預約紀錄</p>
                </div>
            </div>
        </div>
        
        <!-- 新增/編輯課程 -->
        <div id="courseModal" class="tab-content">
            <div class="card">
                <h2 id="courseModalTitle" style="margin-bottom: 20px; color: var(--text);">➕ 新增課程</h2>
                <div class="form-group">
                    <label>課程名稱</label>
                    <input type="text" id="courseName" placeholder="例如：基礎瑜伽">
                </div>
                <div class="form-group">
                    <label>授課老師</label>
                    <input type="text" id="courseTeacher" placeholder="例如：小怡老師">
                </div>
                <div class="form-group">
                    <label>上課時間（每週）</label>
                    <select id="courseDay">
                        <option value="1">星期一</option>
                        <option value="2">星期二</option>
                        <option value="3">星期三</option>
                        <option value="4">星期四</option>
                        <option value="5" selected>星期五</option>
                        <option value="6">星期六</option>
                        <option value="0">星期日</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>時段</label>
                    <select id="courseTime">
                        <option value="15:00">下午 3:00</option>
                        <option value="09:00">早上 9:00</option>
                        <option value="10:30">早上 10:30</option>
                        <option value="14:00">下午 2:00</option>
                        <option value="16:00">下午 4:00</option>
                        <option value="19:00">晚上 7:00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>課程說明</label>
                    <textarea id="courseDesc" rows="2" placeholder="課程簡短說明"></textarea>
                </div>
                <button onclick="saveCourse()" id="saveCourseBtn">💾 儲存課程</button>
                <button onclick="switchTab('manage')" style="margin-top: 10px; background: #aaa;">取消</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = '9527';
        const BOOKINGS_KEY = 'yoga_bookings';
        const COURSES_KEY = 'yoga_courses';
        
        // 預設課程
        let courses = JSON.parse(localStorage.getItem(COURSES_KEY)) || [
            {id: 1, name: '基礎瑜伽', teacher: '小怡老師', day: 5, time: '15:00', desc: '每週五下午基礎瑜伽課程'}
        ];
        let bookings = JSON.parse(localStorage.getItem(BOOKINGS_KEY)) || '[]';
        
        // 初始化 - 只允許星期五
        const today = new Date();
        const dayOfWeek = today.getDay();
        let minDate = new Date(today);
        
        // 如果今天不是星期五，找到下一個星期五
        if (dayOfWeek !== 5) {
            const daysUntilFriday = (5 - dayOfWeek + 7) % 7;
            if (daysUntilFriday === 0) daysUntilFriday = 7;
            minDate.setDate(today.getDate() + daysUntilFriday);
        }
        
        const minDateStr = minDate.toISOString().split('T')[0];
        document.getElementById('datePicker').setAttribute('min', minDateStr);
        
        // 日期變更時檢查是否為星期五
        document.getElementById('datePicker').addEventListener('change', function() {
            const selected = new Date(this.value);
            const selectedDay = selected.getDay();
            if (selectedDay !== 5) {
                alert('目前僅開放禮拜五預約');
                this.value = '';
            }
        });
        
        // 儲存預設課程
        localStorage.setItem(COURSES_KEY, JSON.stringify(courses));
        
        // 渲染課程選項
        function renderCourseOptions() {
            const select = document.getElementById('courseSelect');
            select.innerHTML = '<option value="">請選擇課程</option>';
            courses.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name} - ${c.teacher}</option>`;
            });
        }
        renderCourseOptions();
        
        // 切換標籤
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tabId === 'book') {
                document.querySelector('[onclick="switchTab(\'book\')"]').classList.add('active');
                document.getElementById('book').classList.add('active');
            } else if (tabId === 'manage') {
                document.querySelector('[onclick="showLogin()"]').classList.add('active');
                document.getElementById('manage').classList.add('active');
                renderCourses();
                renderBookings();
            } else if (tabId === 'courseModal') {
                document.getElementById('courseModal').classList.add('active');
            }
        }
        
        // 顯示登入
        function showLogin() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('login').classList.add('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').style.display = 'none';
        }
        
        // 檢查密碼
        function checkPassword() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                switchTab('manage');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        // 提交表單
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const courseId = parseInt(formData.get('course'));
            const course = courses.find(c => c.id === courseId);
            
            const booking = {
                id: Date.now(),
                name: formData.get('name'),
                phone: formData.get('phone'),
                line: formData.get('line') || '',
                courseId: courseId,
                courseName: course ? course.name : '',
                courseTeacher: course ? course.teacher : '',
                date: formData.get('date'),
                time: formData.get('time'),
                note: formData.get('note') || '',
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            bookings.push(booking);
            localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings));
            
            this.style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            
            setTimeout(() => {
                this.reset();
                this.style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
        
        // 渲染課程列表
        function renderCourses() {
            const list = document.getElementById('courseList');
            if (courses.length === 0) {
                list.innerHTML = '<p class="empty-state">尚無課程</p>';
                return;
            }
            const dayNames = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            list.innerHTML = courses.map(c => `
                <div class="course-item">
                    <div class="course-info">
                        <div class="course-name">${c.name}</div>
                        <div class="course-detail">👩‍🏫 ${c.teacher} | 🗓️ 每週${dayNames[c.day]} ${c.time}</div>
                    </div>
                    <div class="course-actions">
                        <button class="btn-edit" onclick="editCourse(${c.id})">編輯</button>
                        <button class="btn-delete" onclick="deleteCourse(${c.id})">刪除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 顯示新增課程
        function showAddCourse() {
            document.getElementById('courseModalTitle').innerText = '➕ 新增課程';
            document.getElementById('courseName').value = '';
            document.getElementById('courseTeacher').value = '';
            document.getElementById('courseDay').value = '5';
            document.getElementById('courseTime').value = '15:00';
            document.getElementById('courseDesc').value = '';
            document.getElementById('saveCourseBtn').onclick = saveCourse;
            switchTab('courseModal');
        }
        
        // 編輯課程
        function editCourse(id) {
            const course = courses.find(c => c.id === id);
            if (!course) return;
            document.getElementById('courseModalTitle').innerText = '✏️ 編輯課程';
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseTeacher').value = course.teacher;
            document.getElementById('courseDay').value = course.day;
            document.getElementById('courseTime').value = course.time;
            document.getElementById('courseDesc').value = course.desc || '';
            document.getElementById('saveCourseBtn').onclick = () => saveCourse(id);
            switchTab('courseModal');
        }
        
        // 儲存課程
        function saveCourse(editId) {
            const name = document.getElementById('courseName').value.trim();
            const teacher = document.getElementById('courseTeacher').value.trim();
            const day = parseInt(document.getElementById('courseDay').value);
            const time = document.getElementById('courseTime').value;
            const desc = document.getElementById('courseDesc').value.trim();
            
            if (!name || !teacher) {
                alert('請填寫課程名稱和授課老師');
                return;
            }
            
            if (editId) {
                const idx = courses.findIndex(c => c.id === editId);
                if (idx !== -1) {
                    courses[idx] = {...courses[idx], name, teacher, day, time, desc};
                }
            } else {
                courses.push({id: Date.now(), name, teacher, day, time, desc});
            }
            
            localStorage.setItem(COURSES_KEY, JSON.stringify(courses));
            renderCourseOptions();
            renderCourses();
            switchTab('manage');
        }
        
        // 刪除課程
        function deleteCourse(id) {
            if (confirm('確定要刪除這門課程嗎？')) {
                courses = courses.filter(c => c.id !== id);
                localStorage.setItem(COURSES_KEY, JSON.stringify(courses));
                renderCourseOptions();
                renderCourses();
            }
        }
        
        // 渲染預約列表
        function renderBookings() {
            const tbody = document.getElementById('bookingsTable');
            const emptyState = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = bookings.filter(b => 
                b.name.toLowerCase().includes(searchTerm) ||
                b.phone.includes(searchTerm) ||
                b.date.includes(searchTerm)
            ).sort((a, b) => new Date(a.date) - new Date(b.date));
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                tbody.innerHTML = filtered.map(b => `
                    <tr>
                        <td>${b.date}</td>
                        <td>${b.name}<br><small>${b.phone}</small></td>
                        <td>${b.courseName || '-'}</td>
                        <td>${b.time}</td>
                        <td><span class="status ${b.status}">${getStatusName(b.status)}</span></td>
                        <td>
                            <button onclick="updateStatus(${b.id}, 'confirmed')" style="padding:5px 10px;font-size:12px;width:auto;">確認</button>
                            <button onclick="updateStatus(${b.id}, 'completed')" style="padding:5px 10px;font-size:12px;width:auto;background:#aaa;">完成</button>
                            <button onclick="deleteBooking(${b.id})" style="padding:5px 10px;font-size:12px;width:auto;background:#ff6b6b;">刪除</button>
                        </td>
                    </tr>
                `).join('');
            }
            updateStats();
        }
        
        // 更新統計
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const weekEnd = new Date();
            weekEnd.setDate(weekEnd.getDate() + 7);
            
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('todayBookings').textContent = bookings.filter(b => b.date === today).length;
            document.getElementById('weekBookings').textContent = bookings.filter(b => b.date >= today && b.date <= weekEnd.toISOString().split('T')[0]).length;
        }
        
        // 更新狀態
        function updateStatus(id, status) {
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                bookings[index].status = status;
                localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings));
                renderBookings();
            }
        }
        
        // 刪除預約
        function deleteBooking(id) {
            if (confirm('確定要刪除這筆預約嗎？')) {
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings));
                renderBookings();
            }
        }
        
        // 狀態名稱
        function getStatusName(status) {
            const statuses = {'pending': '待確認', 'confirmed': '已確認', 'completed': '已完成'};
            return statuses[status] || status;
        }
        
        // 綁定 Enter 登入
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
