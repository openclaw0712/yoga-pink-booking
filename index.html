<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九容瑜伽</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;background:linear-gradient(135deg,#ffe5ec,#ffc2d1);min-height:100vh;padding:20px}
        .container{max-width:450px;margin:0 auto}
        .card{background:white;border-radius:20px;padding:25px;margin-bottom:20px;box-shadow:0 10px30px rgba(164,19,60,0.15)}
        h1{text-align:center;color:#590d22;margin-bottom:20px}
        input,select,textarea{width:100%;padding:12px;border:2px solid #ffc2d1;border-radius:10px;margin-bottom:15px;font-size:16px}
        button{width:100%;padding:14px;background:#ff8fab;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
        .tab{display:flex;gap:10px;margin-bottom:20px}
        .tab button{flex:1;background:rgba(255,255,255,0.6);color:#590d22}
        .tab button.active{background:#ff8fab;color:white}
        .screen{display:none}
        .screen.active{display:block}
        .booking{background:#fff0f3;padding:15px;border-radius:10px;margin-bottom:10px;border-left:4px solid #ff8fab}
        .booking .date{font-weight:600;color:#590d22}
        .booking .info{font-size:14px;color:#a4133c}
        .btn-danger{background:#ff6b6b;width:auto;padding:8px 15px;font-size:14px}
        .btn-group{display:flex;gap:10px;margin-top:10px}
        .btn-group button{width:auto;flex:1;padding:10px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .user-info{text-align:center;padding:15px;background:#fff0f3;border-radius:10px;margin-bottom:15px}
        .checkbox{display:flex;align-items:center;gap:8px;margin-bottom:15px}
        .checkbox input{width:auto;margin:0}
        .error{color:red;font-size:14px;text-align:center}
    </style>
</head>
<body>
<div class="container">
    <h1>🌸 九容瑜伽</h1>
    
    <!-- 登入畫面 -->
    <div id="loginScreen" class="screen active">
        <div class="card">
            <div class="tab">
                <button class="active" onclick="showTab('login')">登入</button>
                <button onclick="showTab('register')">註冊</button>
            </div>
            
            <div id="loginTab">
                <input type="tel" id="phone" placeholder="手機號碼">
                <input type="password" id="password" placeholder="密碼">
                <div class="checkbox">
                    <input type="checkbox" id="remember">
                    <label>記住我</label>
                </div>
                <button onclick="doLogin()">登入</button>
                <p class="error" id="loginError"></p>
            </div>
            
            <div id="registerTab" style="display:none">
                <input type="text" id="regName" placeholder="姓名">
                <input type="tel" id="regPhone" placeholder="手機號碼">
                <input type="password" id="regPassword" placeholder="密碼">
                <button onclick="doRegister()">註冊</button>
                <p class="error" id="regError"></p>
            </div>
        </div>
        
        <div class="card" style="text-align:center">
            <p>老師登入</p>
            <button class="outline" style="background:transparent;border:2px solid #ff8fab;color:#ff8fab" onclick="showScreen('teacherLogin')">老師入口</button>
        </div>
    </div>
    
    <!-- 學員畫面 -->
    <div id="studentScreen" class="screen">
        <div class="header">
            <div class="user-info">
                <div id="userName" style="font-weight:600"></div>
                <div id="userPhone" style="font-size:14px;color:#a4133c"></div>
            </div>
            <button onclick="doLogout()" style="width:auto;padding:8px 15px;background:#aaa">登出</button>
        </div>
        
        <div class="tab">
            <button class="active" onclick="showTab2('book')">預約</button>
            <button onclick="showTab2('my')">我的預約</button>
        </div>
        
        <div id="bookTab" class="card">
            <select id="courseSelect"></select>
            <input type="date" id="dateInput">
            <div id="remaining" style="margin-bottom:15px;color:#fb6f92;font-weight:600"></div>
            <textarea id="note" placeholder="備註"></textarea>
            <button onclick="doBook()">確認預約</button>
        </div>
        
        <div id="myTab" class="card" style="display:none">
            <div id="myList"></div>
        </div>
    </div>
    
    <!-- 老師登入 -->
    <div id="teacherLogin" class="screen">
        <div class="card">
            <h2>👩‍🏫 老師登入</h2>
            <input type="text" id="teacherId" value="teacher" placeholder="ID">
            <input type="password" id="teacherPw" placeholder="密碼">
            <button onclick="doTeacherLogin()">登入</button>
            <button onclick="showScreen('loginScreen')" style="background:#aaa;margin-top:10px">返回</button>
        </div>
    </div>
    
    <!-- 老師後台 -->
    <div id="teacherScreen" class="screen">
        <div class="header">
            <h2>👩‍🏫 老師後台</h2>
            <button onclick="showScreen('loginScreen')" style="width:auto;padding:8px;background:#aaa">登出</button>
        </div>
        <div id="teacherList"></div>
    </div>
</div>

<script>
// 資料
var users = [];
var bookings = [];
var courses = [{id:1,name:'基礎瑜伽',teacher:'小怡老師',capacity:8}];
var currentUser = null;

// 初始化
function init() {
    try {
        users = JSON.parse(localStorage.getItem('yoga_users')) || [];
        bookings = JSON.parse(localStorage.getItem('yoga_bookings')) || [];
        courses = JSON.parse(localStorage.getItem('yoga_courses')) || [{id:1,name:'基礎瑜伽',teacher:'小怡老師',capacity:8}];
        if(courses.length===0){courses=[{id:1,name:'基礎瑜伽',teacher:'小怡老師',capacity:8}]}
    } catch(e) {users=[];bookings=[];courses=[{id:1,name:'基礎瑜伽',teacher:'小怡老師',capacity:8}]}
    save();
    
    // 自動登入
    var savedPhone = localStorage.getItem('yoga_phone');
    var savedPw = localStorage.getItem('yoga_pw');
    if(savedPhone && savedPw) {
        document.getElementById('phone').value = savedPhone;
        document.getElementById('password').value = savedPw;
        document.getElementById('remember').checked = true;
        doLogin();
    }
    
    // 日期
    var dates = [];
    var d = new Date();
    while(dates.length < 12) {
        if(d.getDay() === 5) dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate() + 1);
    }
    var opt = '';
    dates.forEach(function(x) {
        var dd = new Date(x);
        opt += '<option value="'+x+'">'+(dd.getMonth()+1)+'月'+dd.getDate()+'日 禮拜五</option>';
    });
    document.getElementById('dateInput').innerHTML = opt;
}

function save() {
    try {
        localStorage.setItem('yoga_users', JSON.stringify(users));
        localStorage.setItem('yoga_bookings', JSON.stringify(bookings));
        localStorage.setItem('yoga_courses', JSON.stringify(courses));
    } catch(e) {}
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
    document.getElementById(id).classList.add('active');
}

function showTab(tab) {
    document.querySelectorAll('.tab button').forEach(function(b,b_i){b.classList.toggle('active',b_i===(tab==='login'?0:1))});
    document.getElementById('loginTab').style.display = tab==='login'?'block':'none';
    document.getElementById('registerTab').style.display = tab==='register'?'block':'none';
}

function showTab2(tab) {
    document.querySelectorAll('#studentScreen .tab button').forEach(function(b,b_i){b.classList.toggle('active',b_i===(tab==='book'?0:1))});
    document.getElementById('bookTab').style.display = tab==='book'?'block':'none';
    document.getElementById('myTab').style.display = tab==='my'?'block':'none';
    if(tab==='my') renderMy();
}

// 註冊
function doRegister() {
    var name = document.getElementById('regName').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var pw = document.getElementById('regPassword').value;
    
    if(!name || !phone || !pw) {
        document.getElementById('regError').innerText = '請填寫完整';
        return;
    }
    if(users.some(function(u){return u.phone === phone})) {
        document.getElementById('regError').innerText = '已註冊';
        return;
    }
    users.push({id:Date.now(),name:name,phone:phone,pw:pw});
    save();
    alert('註冊成功！請登入');
    showTab('login');
}

// 登入
function doLogin() {
    var phone = document.getElementById('phone').value.trim();
    var pw = document.getElementById('password').value;
    var remember = document.getElementById('remember').checked;
    
    var user = users.find(function(u){return u.phone === phone && u.pw === pw});
    if(user) {
        currentUser = user;
        if(remember) {
            localStorage.setItem('yoga_phone',phone);
            localStorage.setItem('yoga_pw',pw);
        } else {
            localStorage.removeItem('yoga_phone');
            localStorage.removeItem('yoga_pw');
        }
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userPhone').innerText = user.phone;
        showScreen('studentScreen');
        renderCourses();
    } else {
        document.getElementById('loginError').innerText = '帳號或密碼錯誤';
    }
}

function doLogout() {
    currentUser = null;
    showScreen('loginScreen');
}

// 老師登入
function doTeacherLogin() {
    var id = document.getElementById('teacherId').value;
    var pw = document.getElementById('teacherPw').value;
    if(id === 'teacher' && pw === 'yoga9527') {
        showScreen('teacherScreen');
        renderTeacher();
    } else {
        alert('錯誤');
    }
}

// 渲染課程
function renderCourses() {
    var date = document.getElementById('dateInput').value;
    var html = '';
    courses.forEach(function(c) {
        var count = bookings.filter(function(b){return b.courseId===c.id && b.date===date && b.status!='cancelled'}).length;
        var remain = c.capacity - count;
        var disabled = remain<=0 ? 'disabled' : '';
        html += '<option value="'+c.id+'" '+disabled+'>'+c.name+' - '+c.teacher+' (剩'+remain+'位)</option>';
    });
    document.getElementById('courseSelect').innerHTML = html;
    
    if(date) {
        var total = 0;
        courses.forEach(function(c){
            total += c.capacity - bookings.filter(function(b){return b.courseId===c.id && b.date===date && b.status!='cancelled'}).length;
        });
        document.getElementById('remaining').innerText = '當日剩餘：'+total+' 位';
    }
}

document.getElementById('dateInput').addEventListener('change',renderCourses);

// 預約
function doBook() {
    var courseId = parseInt(document.getElementById('courseSelect').value);
    var date = document.getElementById('dateInput').value;
    var note = document.getElementById('note').value;
    var course = courses.find(function(c){return c.id===courseId});
    
    if(!date || !courseId) {alert('請選擇');return;}
    
    // 檢查重複
    if(bookings.some(function(b){return b.userId===currentUser.id && b.courseId===courseId && b.date===date && b.status!='cancelled'})) {
        alert('已預約過');
        return;
    }
    
    // 檢查名額
    var count = bookings.filter(function(b){return b.courseId===courseId && b.date===date && b.status!='cancelled'}).length;
    if(count >= course.capacity) {alert('額滿');return;}
    
    bookings.push({
        id:Date.now(),
        userId:currentUser.id,
        userName:currentUser.name,
        userPhone:currentUser.phone,
        courseId:courseId,
        courseName:course.name,
        courseTeacher:course.teacher,
        date:date,
        time:'15:00',
        note:note,
        status:'confirmed'
    });
    save();
    alert('預約成功！');
    document.getElementById('note').value = '';
    renderCourses();
    showTab2('my');
}

// 我的預約
function renderMy() {
    var my = bookings.filter(function(b){return b.userId===currentUser.id}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var html = '';
    if(my.length === 0) html = '<p style="text-align:center;color:#a4133c">尚無預約</p>';
    my.forEach(function(b) {
        html += '<div class="booking"><div class="date">📅 '+b.date+' '+b.time+'</div><div class="info">'+b.courseName+' - '+b.courseTeacher+'</div>';
        if(b.status !== 'cancelled') {
            html += '<div class="btn-group"><button class="btn-danger" onclick="cancelMy('+b.id+')">取消預約</button></div>';
        }
        html += '</div>';
    });
    document.getElementById('myList').innerHTML = html;
}

function cancelMy(id) {
    if(confirm('取消？')) {
        var b = bookings.find(function(x){return x.id===id});
        if(b) {b.status = 'cancelled'; save(); renderMy(); renderCourses();}
    }
}

// 老師列表
function renderTeacher() {
    var html = '';
    var all = bookings.filter(function(b){return b.status!='cancelled'}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    if(all.length === 0) html = '<p style="text-align:center">尚無預約</p>';
    all.forEach(function(b) {
        html += '<div class="booking"><div class="date">📅 '+b.date+' '+b.time+'</div><div class="info"><b>'+b.userName+'</b> ('+b.userPhone+')<br>'+b.courseName+' - '+b.courseTeacher+'<br>備註: '+(b.note||'-')+'</div>';
        html += '<div class="btn-group"><button class="btn-danger" onclick="deleteBooking('+b.id+')">刪除</button></div></div>';
    });
    document.getElementById('teacherList').innerHTML = html;
}

function deleteBooking(id) {
    if(confirm('刪除？')) {
        bookings = bookings.filter(function(b){return b.id!==id});
        save();
        renderTeacher();
    }
}

init();
</script>
</body>
</html>
