<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九容瑜伽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://d.line-scdn.net/liff/1.0/sdk.js"></script>
<style>
:root {
  --bg-primary: #faf8f5;
  --bg-secondary: #f5f0eb;
  --text-primary: #2d2926;
  --text-secondary: #6b5f54;
  --text-muted: #9c8f85;
  --accent-primary: #8b6f5c;
  --accent-secondary: #c4a484;
  --accent-terracotta: #c67b5c;
  --accent-sage: #7d9a8c;
  --accent-blush: #d4a5a5;
  --accent-gold: #c9a86c;
  --card-bg: #ffffff;
  --shadow-soft: 0 4px 24px rgba(45, 41, 38, 0.06);
  --shadow-hover: 0 8px 40px rgba(45, 41, 38, 0.12);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
}

* {margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html, body {width:100%; overflow-x:hidden}
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
}

/* Hero Section */
.hero {
  position: relative;
  min-height: 45vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px 24px 64px;
  background: linear-gradient(165deg, #f5f0eb 0%, #e8ddd4 50%, #d4c4b5 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 80vw;
  height: 80vw;
  background: radial-gradient(circle, rgba(196,164,132,0.15) 0%, transparent 70%);
  border-radius: 50%;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -20%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(125,154,140,0.1) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius: 50px;
  font-size: 13px;
  color: var(--accent-primary);
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 24px;
  border: 1px solid rgba(139,111,92,0.1);
}

.hero h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 8px;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.hero-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  letter-spacing: 4px;
  font-weight: 300;
  margin-bottom: 32px;
}

.hero-tagline {
  position: relative;
  z-index: 1;
  padding: 16px 32px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-md);
  font-size: 14px;
  color: var(--text-secondary);
  border: 1px solid rgba(139,111,92,0.1);
  max-width: 300px;
}

/* Decorative Elements */
.lotus-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 40px 24px;
}

.lotus-divider span {
  font-size: 24px;
  opacity: 0.3;
}

.lotus-divider::before,
.lotus-divider::after {
  content: '';
  flex: 1;
  max-width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-secondary), transparent);
}

/* Container */
.container {
  max-width: 100%;
  padding: 0 20px 40px;
}

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft);
  transition: all 0.3s ease;
  border: 1px solid rgba(139,111,92,0.05);
}

.card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.card-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

/* Form Elements */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 16px 18px;
  font-size: 16px;
  font-family: inherit;
  border: 1.5px solid rgba(139,111,92,0.15);
  border-radius: var(--radius-md);
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: all 0.2s ease;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--accent-primary);
  background: white;
  box-shadow: 0 0 0 4px rgba(139,111,92,0.08);
}

.form-group input::placeholder {
  color: var(--text-muted);
}

/* Buttons */
.btn {
  width: 100%;
  padding: 18px 24px;
  font-size: 16px;
  font-family: inherit;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 2px;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-primary), #7a5f4a);
  color: white;
  box-shadow: 0 4px 20px rgba(139,111,92,0.3);
}

.btn-primary:hover {
  box-shadow: 0 6px 28px rgba(139,111,92,0.4);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1.5px solid rgba(139,111,92,0.15);
}

.btn-secondary:hover {
  background: var(--bg-primary);
  border-color: var(--accent-secondary);
}

.btn-line {
  background: linear-gradient(135deg, #00b900, #00a000);
  color: white;
  box-shadow: 0 4px 20px rgba(0,185,0,0.25);
}

/* Navigation */
.nav-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}

.nav-tab {
  flex: 1;
  padding: 16px;
  text-align: center;
  font-weight: 500;
  font-size: 14px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.25s ease;
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--accent-primary), #7a5f4a);
  color: white;
  box-shadow: 0 4px 16px rgba(139,111,92,0.25);
}

/* Course Cards */
.course-card {
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft);
  transition: all 0.3s ease;
  border: 1px solid rgba(139,111,92,0.05);
}

.course-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
}

.course-header {
  position: relative;
  height: 120px;
  background: linear-gradient(135deg, var(--accent-sage) 0%, #5d7a6c 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
}

.course-header.special {
  background: linear-gradient(135deg, var(--accent-terracotta) 0%, #a65f42 100%);
}

.course-header.gentle {
  background: linear-gradient(135deg, var(--accent-blush) 0%, #b88888 100%);
}

.course-body {
  padding: 20px;
}

.course-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.course-info {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.course-meta {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.course-tag {
  padding: 6px 14px;
  background: var(--bg-secondary);
  border-radius: 50px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.course-tag.capacity {
  background: rgba(125,154,140,0.15);
  color: var(--accent-sage);
}

/* Booking Items */
.booking-item {
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  padding: 18px;
  margin-bottom: 12px;
  border-left: 4px solid var(--accent-primary);
  transition: all 0.2s ease;
}

.booking-item:hover {
  border-left-color: var(--accent-terracotta);
  transform: translateX(4px);
}

.booking-date {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent-primary);
  margin-bottom: 6px;
}

.booking-info {
  font-size: 14px;
  color: var(--text-secondary);
}

/* Utility */
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); font-size: 14px; }
.mt-16 { margin-top: 16px; }
.mb-12 { margin-bottom: 12px; }
.hidden { display: none !important; }
.link { color: var(--accent-primary); text-decoration: underline; cursor: pointer; }

/* Tab Content */
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Loading */
#loadingOverlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loading-lotus {
  width: 60px;
  height: 60px;
  position: relative;
  animation: lotusFloat 2s ease-in-out infinite;
}

.loading-lotus::before {
  content: '🪷';
  font-size: 48px;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes lotusFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

#loadingOverlay p {
  color: var(--text-secondary);
  margin-top: 24px;
  font-size: 14px;
  letter-spacing: 2px;
}

/* Share Button */
#shareBtn {
  display: none;
  margin-top: 16px;
  padding: 12px 24px !important;
  font-size: 14px !important;
  background: rgba(255,255,255,0.8) !important;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(139,111,92,0.15) !important;
  color: var(--accent-primary) !important;
}

/* Error */
.text-error { color: #c62828; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div id="loadingOverlay">
  <div class="loading-lotus"></div>
  <p>靜心載入中</p>
</div>

<div class="hero">
  <div class="hero-badge">🪷 身心靈和諧</div>
  <h1>九容瑜伽</h1>
  <p class="hero-subtitle">JIURONG YOGA</p>
  <div class="hero-tagline">靜而有容，修身於形。<br>在最舒心的空間，遇見更好的自己。</div>
  <button id="shareBtn" onclick="shareToLine()">📤 分享給朋友</button>
</div>

<div class="lotus-divider"><span>🪷</span></div>

<div class="container">
<div class="nav-tabs" id="mainNav" style="display:none">
  <button class="nav-tab active" onclick="switchTab('courses')">探索課程</button>
  <button class="nav-tab" onclick="switchTab('my')">我的預約</button>
</div>

<!-- Login Tab -->
<div id="tab-login" class="tab-content active">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🧘</div>
      <div class="card-title">會員登入</div>
    </div>
    <div class="form-group">
      <label>手機號碼</label>
      <input type="tel" id="loginPhone" placeholder="09xx xxx xxx" autocomplete="tel">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="loginPw" placeholder="請輸入密碼" autocomplete="current-password">
    </div>
    <button class="btn btn-line" onclick="lineLogin()" style="margin-top:12px">🌿 用 LINE 登入</button>
    <button class="btn btn-primary" onclick="login()">登入</button>
    <p id="loginError" class="text-error text-center" style="display:none"></p>
    <p class="text-center text-muted mt-16">還沒有帳號？<span class="link" onclick="showRegister()">立即註冊</span></p>
  </div>

  <div class="card" style="text-align:center">
    <p class="text-muted" style="margin-bottom:16px">我是老師</p>
    <button class="btn btn-secondary" onclick="showTeacherLogin()">老師入口</button>
  </div>
</div>

<!-- Register Tab -->
<div id="tab-register" class="tab-content">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">✨</div>
      <div class="card-title">加入九容</div>
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="regName" placeholder="請輸入姓名">
    </div>
    <div class="form-group">
      <label>手機號碼</label>
      <input type="tel" id="regPhone" placeholder="09xx xxx xxx">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="regPw" placeholder="設定密碼">
    </div>
    <button class="btn btn-primary" onclick="register()">註冊</button>
    <p class="text-center text-muted mt-16">已有帳號？<span class="link" onclick="showLogin()">返回登入</span></p>
  </div>
</div>

<!-- Teacher Login Tab -->
<div id="tab-teacher" class="tab-content">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👩‍🏫</div>
      <div class="card-title">老師專區</div>
    </div>
    <div class="form-group">
      <label>帳號</label>
      <input type="text" id="teacherId" placeholder="老師帳號">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="teacherPw" placeholder="請輸入密碼">
    </div>
    <button class="btn btn-primary" onclick="teacherLogin()">老師登入</button>
    <p class="text-center text-muted mt-16"><span class="link" onclick="showLogin()">返回會員登入</span></p>
  </div>
</div>

<!-- Courses Tab -->
<div id="tab-courses" class="tab-content">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📚</div>
      <div class="card-title">課程總覽</div>
    </div>
    <div class="form-group">
      <label>選擇課程</label>
      <select id="courseSelect" onchange="showBookingForm()">
        <option value="">請選擇課程</option>
      </select>
    </div>
  </div>

  <div id="bookingForm" class="card hidden">
    <div class="card-header">
      <div class="card-icon">📅</div>
      <div class="card-title">預約時段</div>
    </div>
    <div id="courseDetail"></div>
    <div class="form-group">
      <label>選擇日期</label>
      <input type="date" id="bookDate">
    </div>
    <div class="form-group">
      <label>選擇時段</label>
      <select id="bookTime">
        <option value="">請選擇時段</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="submitBooking()">確認預約</button>
  </div>
</div>

<!-- My Bookings Tab -->
<div id="tab-my" class="tab-content">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📋</div>
      <div class="card-title">我的預約</div>
    </div>
    <div id="bookingList">
      <p class="text-center text-muted">尚無預約記錄</p>
    </div>
  </div>
</div>

<!-- Teacher Dashboard Tab -->
<div id="tab-teacher-dash" class="tab-content">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👩‍🏫</div>
      <div class="card-title">老師管理</div>
    </div>
    <div id="teacherCourseList"></div>
  </div>
</div>
</div>

<script>
const COURSES = [
  {id:1, name:'陰瑜伽', emoji:'🧘‍♀️', desc:'深度伸展與冥想，適合初學者', dur:'60 min', cap:12, cat:'special'},
  {id:2, name:'哈達瑜伽', emoji:'🧘', desc:'傳統體位法練習', dur:'75 min', cap:15, cat:''},
  {id:3, name:'熱瑜伽', emoji:'🔥', desc:'高溫環境下的深度練習', dur:'90 min', cap:10, cat:'special'},
  {id:4, name:'療癒瑜伽', emoji:'💆‍♀️', desc:'舒緩壓力與身心修復', dur:'60 min', cap:8, cat:'gentle'},
  {id:5, name:'晨間流動', emoji:'🌅', desc:'喚醒身體的活潑練習', dur:'45 min', cap:15, cat:''},
];

const TIMES = ['09:00','10:30','14:00','16:00','19:00'];

let currentUser = null;
let isTeacher = false;

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'courses' || tab === 'my') {
    document.getElementById('mainNav').style.display = 'flex';
  } else {
    document.getElementById('mainNav').style.display = 'none';
  }
  event?.target?.classList.add('active');
}

function showLogin() {
  switchTab('login');
  document.getElementById('mainNav').style.display = 'none';
  var header = document.querySelector('.hero');
  var un = header?.querySelector('.user-name');
  if (un) un.remove();
}
function showRegister() { switchTab('register'); }
function showTeacherLogin() { switchTab('teacher'); }

function showBookingForm() {
  const sel = document.getElementById('courseSelect');
  const form = document.getElementById('bookingForm');
  if (sel.value) {
    const c = COURSES.find(x => x.id == sel.value);
    document.getElementById('courseDetail').innerHTML = `
      <div style="background:var(--bg-secondary);padding:16px;border-radius:var(--radius-md);margin-bottom:16px">
        <strong>${c.emoji} ${c.name}</strong><br>
        <span style="font-size:14px;color:var(--text-secondary)">${c.desc}</span><br>
        <span style="font-size:12px;color:var(--text-muted)">${c.dur} · 名額 ${c.cap} 人</span>
      </div>`;
    const timeSel = document.getElementById('bookTime');
    timeSel.innerHTML = '<option value="">請選擇時段</option>' + TIMES.map(t => `<option value="${t}">${t}</option>`).join('');
    form.classList.remove('hidden');
  } else {
    form.classList.add('hidden');
  }
}

function login() {
  const phone = document.getElementById('loginPhone').value;
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');
  if (!phone || !pw) {
    err.textContent = '請填寫所有欄位';
    err.style.display = 'block';
    return;
  }
  if (pw === 'yoga9527' && phone === 'teacher') {
    isTeacher = true;
    err.style.display = 'none';
    switchTab('teacher-dash');
    loadTeacherDash();
    return;
  }
  const users = JSON.parse(localStorage.getItem('yoga_users') || '[]');
  const user = users.find(function(u) { return u.phone === phone && u.pw === pw; });
  if (user) {
    currentUser = user;
    err.style.display = 'none';
    localStorage.setItem('yoga_current', JSON.stringify(user));
    showMemberUI();
  } else {
    err.textContent = '帳號或密碼錯誤';
    err.style.display = 'block';
  }
}

function register() {
  const name = document.getElementById('regName').value;
  const phone = document.getElementById('regPhone').value;
  const pw = document.getElementById('regPw').value;
  if (!name || !phone || !pw) { alert('請填寫所有欄位'); return; }
  const users = JSON.parse(localStorage.getItem('yoga_users') || '[]');
  if (users.some(function(u) { return u.phone === phone; })) {
    alert('此帳號已註冊');
    return;
  }
  users.push({ id: Date.now(), name: name, phone: phone, pw: pw });
  localStorage.setItem('yoga_users', JSON.stringify(users));
  alert('註冊成功！');
  showLogin();
}

function teacherLogin() {
  const id = document.getElementById('teacherId').value;
  const pw = document.getElementById('teacherPw').value;
  if (id === 'teacher' && pw === 'yoga9527') {
    isTeacher = true;
    switchTab('teacher-dash');
    loadTeacherDash();
  } else {
    alert('帳號或密碼錯誤');
  }
}

function loadCourses() {
  const sel = document.getElementById('courseSelect');
  sel.innerHTML = '<option value="">請選擇課程</option>' +
    COURSES.map(c => `<option value="${c.id}">${c.emoji} ${c.name} (${c.dur})</option>`).join('');
}

function loadMyBookings() {
  if (!currentUser) return;
  const bookings = JSON.parse(localStorage.getItem('yoga_bookings') || '[]')
    .filter(b => b.phone === currentUser.phone);
  const list = document.getElementById('bookingList');
  if (bookings.length === 0) {
    list.innerHTML = '<p class="text-center text-muted">尚無預約記錄</p>';
  } else {
    list.innerHTML = bookings.map(b => {
      const c = COURSES.find(x => x.id == b.courseId);
      return `<div class="booking-item">
        <div class="booking-date">${c.emoji} ${c.name}</div>
        <div class="booking-info">${b.date} ${b.time}</div>
      </div>`;
    }).join('');
  }
}

function loadTeacherDash() {
  const bookings = JSON.parse(localStorage.getItem('yoga_bookings') || '[]');
  document.getElementById('teacherCourseList').innerHTML = COURSES.map(c => {
    const count = bookings.filter(b => b.courseId == c.id).length;
    return `<div style="padding:16px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:12px">
      <strong>${c.emoji} ${c.name}</strong>
      <span style="float:right;color:var(--accent-primary)">${count} 人預約</span>
    </div>`;
  }).join('');
}

function submitBooking() {
  const courseId = document.getElementById('courseSelect').value;
  const date = document.getElementById('bookDate').value;
  const time = document.getElementById('bookTime').value;
  if (!courseId || !date || !time) { alert('請填寫所有欄位'); return; }
  const bookings = JSON.parse(localStorage.getItem('yoga_bookings') || '[]');
  bookings.push({ courseId: parseInt(courseId), date, time, phone: currentUser?.phone || 'guest' });
  localStorage.setItem('yoga_bookings', JSON.stringify(bookings));
  alert('預約成功！');
  loadMyBookings();
}

function shareToLine() {
  if (navigator.share) {
    navigator.share({ title: '九容瑜伽', text: '我在九容瑜伽預約了課程，一起來練習吧！', url: location.href });
  } else {
    alert('感謝分享！');
  }
}

// LINE Login
function lineLogin() {
  var clientId = '2009559768';
  var redirectUri = encodeURIComponent('https://openclaw0712.github.io/yoga-pink-booking/');
  var lineAuthUrl = 'https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=' + clientId + '&redirect_uri=' + redirectUri + '&state=yoga123&scope=openid%20profile';
  window.location.href = lineAuthUrl;
}

function getLineProfile() {
  liff.getProfile().then(function(profile) {
    var lineId = profile.userId;
    var displayName = profile.displayName || '';
    if (!displayName || displayName === 'LINE User') {
      var name = 'LINE:' + lineId.substring(0, 12);
    } else {
      var name = displayName + ' (LINE)';
    }
    createOrUpdateUser(lineId, name, '');
  }).catch(function(e) {
    console.log('Get profile error:', e);
    checkLogin();
  });
}

function createOrUpdateUser(lineId, name, picUrl) {
  var users = JSON.parse(localStorage.getItem('yoga_users') || '[]');
  var existingUser = users.find(function(u) { return u.lineId === lineId; });
  if (existingUser) {
    existingUser.name = name;
    currentUser = existingUser;
  } else {
    var newUser = { id: Date.now(), name: name, phone: '', pw: '', lineId: lineId, picUrl: picUrl };
    users.push(newUser);
    currentUser = newUser;
  }
  localStorage.setItem('yoga_users', JSON.stringify(users));
  localStorage.setItem('yoga_current', JSON.stringify(currentUser));
  showMemberUI();
}

function showMemberUI() {
  document.getElementById('mainNav').style.display = 'flex';
  document.getElementById('shareBtn').style.display = 'inline-block';
  var header = document.querySelector('.hero');
  if (currentUser && header) {
    var userName = document.createElement('p');
    userName.className = 'user-name';
    userName.style.cssText = 'color:rgba(255,255,255,0.9);font-size:14px;margin-top:8px';
    userName.innerHTML = '👤 ' + currentUser.name;
    header.appendChild(userName);
  }
  switchTab('courses');
  loadCourses();
  loadMyBookings();
}

function checkLogin() {
  var stored = localStorage.getItem('yoga_current');
  if (stored) {
    try {
      var user = JSON.parse(stored);
      var users = JSON.parse(localStorage.getItem('yoga_users') || '[]');
      if (users.some(function(u) { return u.id === user.id; })) {
        currentUser = user;
        showMemberUI();
        return;
      }
    } catch (e) {}
  }
  showLogin();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('yoga_current');
  location.reload();
}

// Init
window.onload = function() {
  // Check for LINE OAuth callback
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('code')) {
    // LINE OAuth callback - try to initialize LIFF
    if (typeof liff !== 'undefined') {
      liff.init({ liffId: '2009559768' }).then(() => {
        getLineProfile();
      }).catch(() => {
        // LIFF init failed, just show login
        checkLogin();
      });
    } else {
      checkLogin();
    }
  } else {
    checkLogin();
  }
  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
  }, 800);
};
</script>
