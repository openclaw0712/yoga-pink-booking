<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九容瑜伽</title>
    <script charset="utf-8" src="https://d.line-scdn.net/liff/1.0/sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; overflow-x: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", sans-serif;
            background: linear-gradient(180deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            color: #5a3a3a;
            font-size: 16px;
            line-height: 1.5;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #ff8fab 0%, #ff6b8f 100%);
            padding: 32px 20px;
            text-align: center;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 16px rgba(255, 107, 143, 0.3);
        }
        .header h1 { font-size: 28px; color: white; font-weight: 700; }
        .header p { font-size: 14px; color: rgba(255,255,255,0.9); margin-top: 4px; }
        
        /* Container */
        .container {
            max-width: 100%;
            padding: 20px 16px;
        }
        
        /* Card */
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(255, 107, 143, 0.15);
        }
        
        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #d63384;
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            background: #fffafc;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b8f;
        }
        
        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #ff6b8f;
        }
        .checkbox-group label {
            font-size: 15px;
            color: #5a3a3a;
            user-select: none;
        }
        
        /* Button */
        .btn {
            width: 100%;
            padding: 16px 24px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b8f 0%, #e85a7e 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(255, 107, 143, 0.35);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff6b8f;
            color: #ff6b8f;
        }
        
        /* Nav */
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .nav button {
            flex: 1;
            padding: 14px;
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            background: white;
            color: #ff6b8f;
            font-size: 15px;
            font-weight: 600;
        }
        .nav button.active {
            background: #ff6b8f;
            border-color: #ff6b8f;
            color: white;
        }
        
        /* Course Card */
        .course {
            background: #fff0f5;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 14px;
            border-left: 5px solid #ff6b8f;
        }
        .course-name { font-size: 17px; font-weight: 700; color: #d63384; }
        .course-info { font-size: 14px; color: #8a6a6a; margin-top: 6px; }
        .course-cap {
            display: inline-block;
            padding: 4px 12px;
            background: #ffe5ec;
            color: #d63384;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
        }
        .course .btn {
            margin-top: 14px;
            padding: 14px;
        }
        
        /* Booking Card */
        .booking {
            background: #fff5f8;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .booking-date { font-size: 14px; font-weight: 700; color: #ff6b8f; }
        .booking-info { font-size: 14px; color: #8a6a6a; margin-top: 4px; }
        .booking .btn { margin-top: 12px; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tabs button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffe5ec;
            color: #d63384;
            font-size: 14px;
            font-weight: 600;
        }
        .tabs button.active { background: #ff6b8f; color: white; }
        
        /* Link */
        .link {
            color: #ff6b8f;
            text-decoration: underline;
            cursor: pointer;
        }
        
        /* Footer */
        .footer { text-align: center; margin-top: 24px; }
        
        /* Text */
        .text-center { text-align: center; }
        .text-error { color: #c62828; }
        .mt-16 { margin-top: 16px; }
        .mb-12 { margin-bottom: 12px; }
        .hidden { display: none !important; }
        
        /* Tab Content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧘 九容瑜伽</h1>
        <p>動若雲，靜若水，身隨意，境隨心。</p>
        <button id="shareBtn" class="btn btn-secondary" style="margin-top:12px;padding:10px 20px;font-size:14px;display:none" onclick="shareToLine()">📤 分享給朋友</button>
    </div>
    
    <div class="container">
        <!-- Nav -->
        <div class="nav" id="mainNav" style="display:none">
            <button class="active" onclick="switchTab('courses')">課程</button>
            <button onclick="switchTab('my')">我的</button>
        </div>
        
        <!-- Login -->
        <div id="tab-login" class="tab-content active">
            <div class="card">
                <h2 class="text-center mb-12" style="color:#ff6b8f;font-size:20px">會員登入</h2>
                
                <div class="form-group">
                    <label>手機號碼</label>
                    <input type="tel" id="loginPhone" placeholder="09xxxxxxxx" autocomplete="tel">
                </div>
                
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPw" placeholder="請輸入密碼" autocomplete="current-password">
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">記住登入</label>
                </div>
                
                <button id="lineLoginBtn" class="btn" style="background:linear-gradient(135deg,#00B900,#00a000);color:white;margin-top:12px;width:100%;padding:16px 24px;font-size:17px;border-radius:14px" onclick="lineLogin()">
                    ✅ 用 LINE 帳號登入
                </button>
                
                <button class="btn btn-primary" onclick="login()">登入</button>
                <p id="loginError" class="text-center text-error mt-16" style="font-size:14px"></p>
                <p class="text-center mt-16" style="font-size:14px;color:#8a6a6a">
                    還沒帳號？<span class="link" onclick="showRegister()">立即註冊</span>
                </p>
            </div>
            
            <div class="card">
                <p class="text-center" style="color:#8a6a6a;font-size:14px">老師專區</p>
                <button class="btn btn-outline mt-16" onclick="showTeacherLogin()">老師入口</button>
            </div>
        </div>
        
        <!-- Register -->
        <div id="tab-register" class="tab-content">
            <div class="card">
                <h2 class="text-center mb-12" style="color:#ff6b8f;font-size:20px">註冊會員</h2>
                
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="請輸入姓名">
                </div>
                
                <div class="form-group">
                    <label>手機號碼</label>
                    <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
                </div>
                
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPw" placeholder="設定密碼">
                </div>
                
                <button class="btn btn-primary" onclick="register()">註冊</button>
                <p id="regError" class="text-center text-error mt-16" style="font-size:14px"></p>
                <p class="text-center mt-16" style="font-size:14px;color:#8a6a6a">
                    已有帳號？<span class="link" onclick="showLogin()">立即登入</span>
                </p>
            </div>
        </div>
        
        <!-- Courses -->
        <div id="tab-courses" class="tab-content">
            <div class="card">
                <h2 class="mb-12" style="color:#ff6b8f;font-size:18px">📅 每週課程</h2>
                <div id="courseList"></div>
            </div>
            <div class="footer">
                <button class="btn btn-secondary" onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- My Bookings -->
        <div id="tab-my" class="tab-content">
            <div class="card">
                <h2 class="mb-12" style="color:#ff6b8f;font-size:18px">📋 我的預約</h2>
                <div id="myList"></div>
            </div>
            <div class="footer">
                <button class="btn btn-secondary" onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- Book -->
        <div id="tab-book" class="tab-content">
            <div class="card">
                <h2 class="mb-12" style="color:#ff6b8f;font-size:18px">📝 預約報名</h2>
                <div id="bookInfo"></div>
                
                <div class="form-group mt-16">
                    <label>選擇日期</label>
                    <select id="bookDate" onchange="updateRemaining()"></select>
                </div>
                
                <p id="remainingInfo" class="text-center mb-12" style="font-weight:600;color:#ff6b8f"></p>
                
                <button class="btn btn-primary" onclick="confirmBook()">確認預約</button>
                <button class="btn btn-secondary mt-16" onclick="showPage('courses')">返回</button>
                <p id="bookError" class="text-center text-error mt-16" style="font-size:14px"></p>
            </div>
        </div>
        
        <!-- Teacher Login -->
        <div id="tab-teacher-login" class="tab-content">
            <div class="card">
                <h2 class="text-center mb-12" style="color:#ff6b8f;font-size:20px">👩‍🏫 老師登入</h2>
                
                <div class="form-group">
                    <label>帳號</label>
                    <input type="text" id="teacherId" value="teacher">
                </div>
                
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="teacherPw" placeholder="請輸入密碼">
                </div>
                
                <button class="btn btn-primary" onclick="teacherLogin()">登入</button>
                <button class="btn btn-secondary mt-16" onclick="showLogin()">返回</button>
            </div>
        </div>
        
        <!-- Teacher Dashboard -->
        <div id="tab-teacher" class="tab-content">
            <div class="card">
                <h2 class="mb-12" style="color:#ff6b8f;font-size:18px">👩‍🏫 老師後台</h2>
                
                <div class="tabs">
                    <button class="active" onclick="showTeacherTab('members')">會員</button>
                    <button onclick="showTeacherTab('bookings')">預約</button>
                    <button onclick="showTeacherTab('courses')">課程</button>
                </div>
                
                <div id="teacherMembers"></div>
                <div id="teacherBookings" class="hidden"></div>
                <div id="teacherCourses" class="hidden"></div>
            </div>
            <div class="footer">
                <button class="btn btn-secondary" onclick="logout()">登出</button>
            </div>
        </div>
    </div>

<script>
var users=[],bookings=[],courses=[],currentUser=null,selectCourseId=null;
var isInLine=false;

function init(){
    loadData();
    
    // 嘗試初始化 LIFF
    if(typeof liff!=='undefined'){
        liff.init({liffId:'2009559768-h44Oa41n'}).then(function(){
            isInLine=true;
            if(liff.isLoggedIn()){
                getLineProfile();
            }
        }).catch(function(err){
            console.log('LIFF init error:',err);
        });
    }
    
    // 檢查 URL 是否是 LINE Login 回調
    var urlParams=new URLSearchParams(window.location.search);
    var code=urlParams.get('code');
    var state=urlParams.get('state');
    var error=urlParams.get('error');
    
    if(error){
        alert('LINE 登入失敗：'+error);
        showLoginPage();
        return;
    }
    
    if(code && state==='yoga123'){
        processLineLogin(code);
        return;
    }
    
    // 顯示 LINE 登入按鈕
    var btn=document.getElementById('lineLoginBtn');
    if(btn)btn.style.display='block';
    
    checkLogin();
}

function processLineLogin(code){
    alert('處理 LINE 登入...');
    var lineUserId='LINE_'+(code.substring(0,20)||'user');
    var displayName='LINE User';
    
    var existingUser=users.find(function(u){return u.lineId===lineUserId});
    if(existingUser){
        currentUser=existingUser;
        alert('找到舊用戶：'+currentUser.name);
    }else{
        var newUser={id:Date.now(),name:displayName,phone:'',pw:'',lineId:lineUserId};
        users.push(newUser);
        saveData();
        currentUser=newUser;
        alert('建立新用戶：'+displayName);
    }
    
    window.history.replaceState({},document.title,window.location.pathname);
    showMemberUI();
}

function lineLogin(){
    // 使用 LINE Login OAuth2.0 登入
    var clientId='2009559768';
    var redirectUri=encodeURIComponent('https://openclaw0712.github.io/yoga-pink-booking/');
    var lineLoginUrl='https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id='+clientId+'&redirect_uri='+redirectUri+'&state=yoga123&scope=openid%20profile';
    window.location.href=lineLoginUrl;
}

function getLineProfile(){
    liff.getProfile().then(function(profile){
        var lineUserId=profile.userId;
        var displayName=profile.displayName;
        var picUrl=profile.pictureUrl||'';
        var existingUser=users.find(function(u){return u.lineId===lineUserId});
        if(existingUser){
            currentUser=existingUser;
            showMemberUI();
        }else{
            var newUser={id:Date.now(),name:displayName,phone:'',pw:'',lineId:lineUserId,picUrl:picUrl};
            users.push(newUser);
            saveData();
            currentUser=newUser;
            showMemberUI();
        }
    }).catch(function(err){
        console.log('Get profile error:',err);
        checkLogin();
    });
}

function loadData(){
    try{
        users=JSON.parse(localStorage.getItem('yoga_users'))||[];
        bookings=JSON.parse(localStorage.getItem('yoga_bookings'))||[];
        courses=JSON.parse(localStorage.getItem('yoga_courses'))||[];
        if(courses.length===0){
            courses=[{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00-16:00',capacity:8}];
            saveData();
        }
    }catch(e){
        courses=[{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00-16:00',capacity:8}];
    }
}

function saveData(){
    localStorage.setItem('yoga_users',JSON.stringify(users));
    localStorage.setItem('yoga_bookings',JSON.stringify(bookings));
    localStorage.setItem('yoga_courses',JSON.stringify(courses));
}

function showPage(page){
    ['login','register','courses','my','book','teacher-login','teacher'].forEach(function(p){
        document.getElementById('tab-'+p).classList.remove('active');
    });
    document.getElementById('tab-'+page).classList.add('active');
    updateNav(page);
}

function switchTab(tab){
    showPage(tab);
    if(tab==='courses')renderCourses();
    else if(tab==='my')renderMyBookings();
}

function updateNav(page){
    var nav=document.getElementById('mainNav');
    if(!nav)return;
    var buttons=nav.querySelectorAll('button');
    buttons.forEach(function(b,i){
        var tabName=i===0?'courses':'my';
        b.classList.toggle('active',tabName===page);
    });
}

function showLoginPage(){
    showPage('login');
    document.getElementById('mainNav').style.display='none';
}

function showMemberUI(){
    document.getElementById('mainNav').style.display='flex';
    if(isInLine)document.getElementById('shareBtn').style.display='inline-block';
    showPage('courses');
    renderCourses();
}

function shareToLine(){
    if(typeof liff!=='undefined'){
        liff.shareTargetPicker([{
            type:'text',
            text:'🧘 九容瑜伽預約\n\n歡迎預約瑜伽課程！\nhttps://openclaw0712.github.io/yoga-pink-booking/'
        }]).then(function(res){
            if(res)console.log('Share success');
        }).catch(function(err){
            console.log('Share error:',err);
        });
    }
}

function showRegister(){showPage('register')}
function showLogin(){showPage('login')}
function showTeacherLogin(){showPage('teacher-login')}

function register(){
    var n=document.getElementById('regName').value.trim();
    var p=document.getElementById('regPhone').value.trim();
    var pw=document.getElementById('regPw').value;
    if(!n||!p||!pw){document.getElementById('regError').innerText='請填寫完整';return}
    if(users.some(function(u){return u.phone===p})){
        document.getElementById('regError').innerText='此手機已註冊';return
    }
    users.push({id:Date.now(),name:n,phone:p,pw:pw});
    saveData();
    alert('註冊成功！請登入');
    showLogin();
}

function login(){
    var p=document.getElementById('loginPhone').value.trim();
    var pw=document.getElementById('loginPw').value;
    var r=document.getElementById('remember').checked;
    var u=users.find(function(x){return x.phone===p&&x.pw===pw});
    if(u){
        currentUser=u;
        if(r){localStorage.setItem('yoga_current',JSON.stringify(u))}
        showMemberUI();
    }else{
        document.getElementById('loginError').innerText='帳號或密碼錯誤';
    }
}

function checkLogin(){
    var s=localStorage.getItem('yoga_current');
    if(s){
        try{
            var u=JSON.parse(s);
            if(users.some(function(x){return x.id===u.id})){
                currentUser=u;
                showMemberUI();
                return;
            }
        }catch(e){}
    }
    showLoginPage();
}

function logout(){
    currentUser=null;
    localStorage.removeItem('yoga_current');
    showLoginPage();
}

function teacherLogin(){
    var id=document.getElementById('teacherId').value;
    var pw=document.getElementById('teacherPw').value;
    if(id==='teacher'&&pw==='yoga9527'){
        document.getElementById('mainNav').style.display='none';
        showPage('teacher');
        renderTeacher();
    }else{alert('帳號或密碼錯誤')}
}

function getFridays(){
    var d=[],dd=new Date();
    while(d.length<12){
        if(dd.getDay()===5)d.push(dd.toISOString().split('T')[0]);
        dd.setDate(dd.getDate()+1);
    }
    return d;
}

function renderCourses(){
    var dates=getFridays(),next=dates[0],html='';
    courses.forEach(function(c){
        var b=bookings.filter(function(x){return x.courseId===c.id&&x.date===next&&x.status!=='cancelled'}).length;
        var r=c.capacity-b;
        html+='<div class="course">';
        html+='<div class="course-name">'+c.name+'</div>';
        html+='<div class="course-info">👩‍🏫 '+c.teacher+' ⏰ '+(c.time||'15:00-16:00')+'</div>';
        html+='<div class="course-info">名額 '+c.capacity+' 人</div>';
        if(r>0){html+='<button class="btn btn-primary" onclick="goBook('+c.id+')">預約</button>'}
        html+='</div>';
    });
    document.getElementById('courseList').innerHTML=html;
}

function goBook(id){
    selectCourseId=id;
    var c=courses.find(function(x){return x.id===id});
    var html='<div class="course"><div class="course-name">'+c.name+'</div>';
    html+='<div class="course-info">👩‍🏫 '+c.teacher+' ⏰ '+(c.time||'15:00-16:00')+'</div></div>';
    document.getElementById('bookInfo').innerHTML=html;
    var dates=getFridays(),opt='';
    dates.forEach(function(d){
        var dd=new Date(d);
        opt+='<option value="'+d+'">'+(dd.getMonth()+1)+'/'+dd.getDate()+' (五)</option>';
    });
    document.getElementById('bookDate').innerHTML=opt;
    updateRemaining();
    showPage('book');
}

function updateRemaining(){
    var c=courses.find(function(x){return x.id===selectCourseId}),date=document.getElementById('bookDate').value;
    var b=bookings.filter(function(x){return x.courseId===selectCourseId&&x.date===date&&x.status!=='cancelled'}).length;
    var r=c.capacity-b;
    document.getElementById('remainingInfo').innerHTML=r>0?'剩餘名額：<span style="color:#22c55e">'+r+'</span> / '+c.capacity:'<span style="color:#c62828">已額滿</span>';
}

function confirmBook(){
    var c=courses.find(function(x){return x.id===selectCourseId}),date=document.getElementById('bookDate').value;
    if(bookings.some(function(x){return x.phone===currentUser.phone&&x.courseId===selectCourseId&&x.date===date&&x.status!=='cancelled'})){
        document.getElementById('bookError').innerText='您已預約過';return
    }
    var b=bookings.filter(function(x){return x.courseId===selectCourseId&&x.date===date&&x.status!=='cancelled'}).length;
    if(b>=c.capacity){document.getElementById('bookError').innerText='名額已滿';return}
    bookings.push({id:Date.now(),courseId:c.id,courseName:c.name,teacher:c.teacher,date:date,time:c.time,name:currentUser.name,phone:currentUser.phone,status:'confirmed'});
    saveData();
    alert('預約成功！');
    
    // 如果在 LINE 中，發送預約確認
    if(isInLine && typeof liff!=='undefined'){
        var msg='✅ 預約成功\n\n📅 日期：'+date+'\n🧘 課程：'+c.name+'\n⏰ 時間：'+c.time+'\n👤 姓名：'+currentUser.name;
        liff.sendMessages([{type:'text',text:msg}]).then(function(){
            console.log('Message sent');
        }).catch(function(err){
            console.log('Send message error:',err);
        });
    }
    
    showPage('my');
    renderMyBookings();
}

function renderMyBookings(){
    var my=bookings.filter(function(x){return x.phone===currentUser.phone&&x.status!=='cancelled'}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var html='';
    if(my.length===0){html='<p class="text-center" style="color:#8a6a6a">尚無預約</p>'}
    else{
        my.forEach(function(b){
            html+='<div class="booking">';
            html+='<div class="booking-date">📅 '+b.date+' '+(b.time||'15:00-16:00')+'</div>';
            html+='<div class="booking-info">'+b.courseName+' - '+b.teacher+'</div>';
            html+='<button class="btn btn-secondary" onclick="cancelBook('+b.id+')">取消預約</button>';
            html+='</div>';
        });
    }
    document.getElementById('myList').innerHTML=html;
}

function cancelBook(id){
    if(confirm('確定取消？')){
        var b=bookings.find(function(x){return x.id===id});
        if(b){b.status='cancelled';saveData();renderMyBookings()}
    }
}

function showTeacherTab(tab){
    document.querySelectorAll('.tabs button').forEach(function(b,i){
        var idx=tab==='members'?0:tab==='bookings'?1:2;
        b.classList.toggle('active',i===idx);
    });
    document.getElementById('teacherMembers').classList.toggle('hidden',tab!=='members');
    document.getElementById('teacherBookings').classList.toggle('hidden',tab!=='bookings');
    document.getElementById('teacherCourses').classList.toggle('hidden',tab!=='courses');
    if(tab==='members')renderTeacherMembers();
    else if(tab==='bookings')renderTeacherBookings();
    else if(tab==='courses')renderTeacherCourses();
}

function renderTeacher(){renderTeacherMembers()}

function renderTeacherMembers(){
    var html='';
    if(users.length===0){html='<p class="text-center" style="color:#8a6a6a">尚無會員</p>'}
    else{
        users.forEach(function(u){
            html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #ffe5ec">';
            html+='<span><b>'+u.name+'</b> ('+u.phone+')</span>';
            html+='<button onclick="delMember('+u.id+')" style="background:#c62828;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:13px">刪除</button>';
            html+='</div>';
        });
    }
    document.getElementById('teacherMembers').innerHTML=html;
}

function renderTeacherBookings(){
    var g={},all=bookings.filter(function(x){return x.status!=='cancelled'});
    all.forEach(function(b){
        var k=b.courseId+'_'+b.date;
        if(!g[k]){g[k]={courseName:b.courseName,teacher:b.teacher,date:b.date,time:b.time,students:[]}}
        g[k].students.push(b);
    });
    var html='';
    if(all.length===0){html='<p class="text-center" style="color:#8a6a6a">尚無預約</p>'}
    else{
        Object.keys(g).forEach(function(k){
            var x=g[k];
            html+='<div class="course" onclick="toggleStudents(\''+k+'\')" style="cursor:pointer">';
            html+='<div class="booking-date">📅 '+x.date+' '+(x.time||'15:00-16:00')+'</div>';
            html+='<div class="booking-info"><b>'+x.courseName+'</b> - '+x.teacher+'</div>';
            html+='<div class="booking-info" style="color:#ff6b8f">👥 '+x.students.length+' 人預約 ▼</div>';
            html+='<div id="s-'+k+'" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ffc2d1">';
            x.students.forEach(function(s){
                html+='<div style="padding:10px;background:#fff;border-radius:8px;margin-bottom:8px;font-size:14px"><b>'+s.name+'</b> ('+s.phone+')</div>';
            });
            html+='</div></div>';
        });
    }
    document.getElementById('teacherBookings').innerHTML=html;
}

function toggleStudents(k){
    var el=document.getElementById('s-'+k);
    el.style.display=el.style.display==='none'?'block':'none';
}

function renderTeacherCourses(){
    var html='<h3 style="color:#5a3a3a;margin-bottom:12px;font-size:15px">新增課程</h3>';
    html+='<div class="form-group"><input type="text" id="newCourseName" placeholder="課程名稱"></div>';
    html+='<div class="form-group"><input type="text" id="newCourseTeacher" placeholder="老師名稱"></div>';
    html+='<div class="form-group"><input type="text" id="newCourseTime" placeholder="時間 (如 15:00-16:00)"></div>';
    html+='<div class="form-group"><input type="number" id="newCourseCapacity" placeholder="名額" value="8"></div>';
    html+='<button class="btn btn-primary" onclick="addCourse()">新增課程</button>';
    html+='<h3 style="color:#5a3a3a;margin:20px 0 12px;font-size:15px">現有課程</h3>';
    if(courses.length===0){html+='<p class="text-center" style="color:#8a6a6a">尚無課程</p>'}
    else{
        courses.forEach(function(c){
            html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #ffe5ec;font-size:14px">';
            html+='<span><b>'+c.name+'</b> - '+c.teacher+' ('+(c.time||'15:00-16:00')+', '+c.capacity+'人)</span>';
            html+='<button onclick="delCourse('+c.id+')" style="background:#c62828;color:white;border:none;padding:6px 10px;border-radius:6px;font-size:12px">刪除</button>';
            html+='</div>';
        });
    }
    document.getElementById('teacherCourses').innerHTML=html;
}

function addCourse(){
    var n=document.getElementById('newCourseName').value.trim();
    var t=document.getElementById('newCourseTeacher').value.trim();
    var ti=document.getElementById('newCourseTime').value.trim();
    var c=parseInt(document.getElementById('newCourseCapacity').value)||8;
    if(!n||!t||!ti){alert('請填寫課程名稱、老師、時間');return}
    courses.push({id:Date.now(),name:n,teacher:t,time:ti,capacity:c});
    saveData();
    document.getElementById('newCourseName').value='';
    document.getElementById('newCourseTeacher').value='';
    document.getElementById('newCourseTime').value='';
    alert('課程已新增！');
    renderTeacherCourses();
}

function delCourse(id){
    if(confirm('刪除此課程？')){courses=courses.filter(function(x){return x.id!==id});saveData();renderTeacherCourses()}
}

function delMember(id){
    if(confirm('刪除此會員？')){
        var u=users.find(function(x){return x.id===id});
        users=users.filter(function(x){return x.id!==id});
        bookings=bookings.filter(function(x){return x.phone!==u.phone});
        saveData();
        renderTeacherMembers();
    }
}

init();
</script>
</body>
</html>
