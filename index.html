<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九容瑜伽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffe5ec;
            color: #590d22;
            min-height: 100vh;
        }
        .header {
            background: #ff8fab;
            padding: 25px 20px;
            text-align: center;
        }
        .header h1 { font-size: 32px; color: #fff; }
        .header p { font-size: 16px; color: #fff5f5; margin-top: 5px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .nav { display: none; gap: 10px; margin-bottom: 20px; }
        .nav button {
            flex: 1; padding: 12px; background: white; border: 2px solid #ff8fab;
            border-radius: 25px; color: #ff8fab; font-weight: 600;
        }
        .nav button.active { background: #ff8fab; color: white; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.2);
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #ff8fab; }
        .form-group input, .form-group select {
            width: 100%; padding: 14px; border: 2px solid #ffc2d1;
            border-radius: 15px; font-size: 16px;
        }
        
        .btn-primary {
            width: 100%; padding: 15px; background: #ff8fab; color: white;
            border: none; border-radius: 25px; font-size: 16px; font-weight: 600;
        }
        .btn-primary:disabled { background: #ccc; }
        
        .course-card {
            padding: 18px; background: #fff0f3; border-radius: 15px;
            margin-bottom: 12px; border-left: 5px solid #ff8fab;
        }
        .course-card .name { font-size: 18px; font-weight: 700; color: #ff8fab; }
        .course-card .info { font-size: 14px; color: #a4133c; margin: 5px 0; }
        .course-card .bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .course-card .capacity { background: #ffe5ec; color: #ff8fab; padding: 5px 12px; border-radius: 20px; }
        .course-card button { background: #ff8fab; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: 600; }
        
        .booking-card { padding: 15px; background: #fff0f3; border-radius: 12px; margin-bottom: 10px; }
        .booking-card .date { font-weight: 700; color: #ff8fab; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tabs button { flex: 1; padding: 10px; background: #ffe5ec; border: none; border-radius: 10px; color: #ff8fab; font-weight: 600; }
        .tabs button.active { background: #ff8fab; color: white; }
        
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #ffe5ec; }
        .member-item button { background: #ff8fab; color: white; border: none; padding: 8px 15px; border-radius: 15px; }
        
        .error { color: #c62828; text-align: center; margin-bottom: 10px; }
        .hidden { display: none; }
        .footer { text-align: center; margin-top: 20px; }
        .footer button { background: #ff8fab; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧘 九容瑜伽</h1>
        <p>動若雲，靜若水，身隨意，境隨心。</p>
    </div>
    
    <div class="container">
        <!-- 導航 -->
        <div class="nav" id="mainNav">
            <button class="active" data-tab="courses">課程</button>
            <button data-tab="my">我的</button>
        </div>
        
        <!-- 登入 -->
        <div id="tab-login">
            <div class="card">
                <h2 style="text-align:center;color:#ff8fab;margin-bottom:20px">🔐 會員登入</h2>
                <div class="form-group">
                    <label>手機</label>
                    <input type="tel" id="loginPhone" placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPw" placeholder="密碼">
                </div>
                <div class="form-group" style="display:flex;align-items:center">
                    <input type="checkbox" id="rememberMe" style="width:auto;margin-right:8px">
                    <label style="margin:0">記住登入</label>
                </div>
                <button class="btn-primary" onclick="doLogin()">登入</button>
                <p id="loginError" class="error"></p>
                <p style="text-align:center;margin-top:15px">
                    還沒帳號？<a href="#" onclick="showRegister();return false" style="color:#ff8fab">立即註冊</a>
                </p>
            </div>
            
            <div class="card" id="registerCard" style="display:none">
                <h2 style="text-align:center;color:#ff8fab;margin-bottom:20px">✨ 註冊會員</h2>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="regName" placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label>手機</label>
                    <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPw" placeholder="設定密碼">
                </div>
                <button class="btn-primary" onclick="doRegister()">註冊</button>
                <p id="regError" class="error"></p>
                <p style="text-align:center;margin-top:15px">
                    已有帳號？<a href="#" onclick="showLogin();return false" style="color:#ff8fab">立即登入</a>
                </p>
            </div>
            
            <div class="card" style="text-align:center">
                <p style="color:#a4133c">老師專區</p>
                <button onclick="showTeacherLogin()" style="background:transparent;border:2px solid #ff8fab;color:#ff8fab;padding:12px 30px;border-radius:25px;margin-top:10px;font-weight:600">老師入口</button>
            </div>
        </div>
        
        <!-- 課程列表 -->
        <div id="tab-courses" class="hidden">
            <div class="card">
                <h2 style="color:#ff8fab;margin-bottom:15px">📅 每週課程</h2>
                <div id="courseList"></div>
            </div>
            <div class="footer">
                <button onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- 我的預約 -->
        <div id="tab-my" class="hidden">
            <div class="card">
                <h2 style="color:#ff8fab;margin-bottom:15px">📋 我的預約</h2>
                <div id="myBookingList"></div>
            </div>
            <div class="footer">
                <button onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- 老師登入 -->
        <div id="tab-teacher-login" class="hidden">
            <div class="card">
                <h2 style="text-align:center;color:#ff8fab;margin-bottom:20px">👩‍🏫 老師登入</h2>
                <div class="form-group">
                    <label>帳號</label>
                    <input type="text" id="teacherId" value="teacher">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="teacherPw">
                </div>
                <button class="btn-primary" onclick="doTeacherLogin()">登入</button>
                <button onclick="showLoginTab()" style="background:#ccc;border:none;padding:12px;border-radius:25px;width:100%;margin-top:10px">返回</button>
            </div>
        </div>
        
        <!-- 老師後台 -->
        <div id="tab-teacher" class="hidden">
            <div class="card">
                <h2 style="color:#ff8fab;margin-bottom:15px">👩‍🏫 老師後台</h2>
                
                <div class="tabs">
                    <button class="active" onclick="showTeacherTab('members')">會員</button>
                    <button onclick="showTeacherTab('bookings')">預約</button>
                </div>
                
                <div id="teacherMembers"></div>
                <div id="teacherBookings" class="hidden"></div>
            </div>
            <div class="footer">
                <button onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- 預約畫面 -->
        <div id="tab-book" class="hidden">
            <div class="card">
                <h2 style="color:#ff8fab;margin-bottom:15px">📝 預約報名</h2>
                <div class="form-group">
                    <label>課程</label>
                    <div id="bookCourseName" style="padding:12px;background:#fff0f3;border-radius:10px;font-weight:600;color:#ff8fab"></div>
                </div>
                <div class="form-group">
                    <label>選擇日期</label>
                    <select id="bookDate"></select>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <div id="bookName" style="padding:12px;background:#fff0f3;border-radius:10px"></div>
                </div>
                <div class="form-group">
                    <label>手機</label>
                    <div id="bookPhone" style="padding:12px;background:#fff0f3;border-radius:10px"></div>
                </div>
                <button class="btn-primary" onclick="confirmBooking()">確認預約</button>
                <button onclick="showTab('courses')" style="background:#ccc;border:none;padding:12px;border-radius:25px;width:100%;margin-top:10px">返回</button>
                <p id="bookError" class="error"></p>
            </div>
        </div>
    </div>

<script>
var users = [], bookings = [], courses = [], currentUser = null, selectedCourseId = null;

function init() {
    loadData();
    renderDateOptions();
    checkAutoLogin();
}

function loadData() {
    try {
        users = JSON.parse(localStorage.getItem('yoga_users')) || [];
        bookings = JSON.parse(localStorage.getItem('yoga_bookings')) || [];
        courses = JSON.parse(localStorage.getItem('yoga_courses')) || [];
        if (!courses.length) {
            courses = [{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00',capacity:8}];
            saveData();
        }
    } catch(e) {
        courses = [{id:1,name:'基礎瑜伽',teacher:'小怡老師',time:'15:00',capacity:8}];
    }
}

function saveData() {
    localStorage.setItem('yoga_users', JSON.stringify(users));
    localStorage.setItem('yoga_bookings', JSON.stringify(bookings));
    localStorage.setItem('yoga_courses', JSON.stringify(courses));
}

function showTab(tab) {
    document.getElementById('tab-login').classList.add('hidden');
    document.getElementById('tab-courses').classList.add('hidden');
    document.getElementById('tab-my').classList.add('hidden');
    document.getElementById('tab-teacher-login').classList.add('hidden');
    document.getElementById('tab-teacher').classList.add('hidden');
    document.getElementById('tab-book').classList.add('hidden');
    document.getElementById('tab-' + tab).classList.remove('hidden');
}

function showLoginTab() {
    document.getElementById('mainNav').style.display = 'none';
    showTab('login');
}

function showMemberUI() {
    document.getElementById('mainNav').style.display = 'flex';
    showTab('courses');
    renderCourses();
}

function showRegister() {
    document.getElementById('registerCard').style.display = 'block';
}

function showLogin() {
    document.getElementById('registerCard').style.display = 'none';
}

function showTeacherLogin() {
    showTab('teacher-login');
}

function showTeacherTab(tab) {
    document.querySelectorAll('.tabs button').forEach(function(b,i) {
        b.classList.toggle('active', (tab==='members' && i===0) || (tab==='bookings' && i===1));
    });
    document.getElementById('teacherMembers').classList.toggle('hidden', tab !== 'members');
    document.getElementById('teacherBookings').classList.toggle('hidden', tab !== 'bookings');
}

function doRegister() {
    var name = document.getElementById('regName').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var pw = document.getElementById('regPw').value;
    
    if (!name || !phone || !pw) {
        document.getElementById('regError').innerText = '請填寫完整';
        return;
    }
    if (users.some(function(u){return u.phone === phone})) {
        document.getElementById('regError').innerText = '此手機已註冊';
        return;
    }
    
    users.push({id:Date.now(),name:name,phone:phone,pw:pw});
    saveData();
    alert('註冊成功！請登入');
    showLogin();
}

function doLogin() {
    var phone = document.getElementById('loginPhone').value.trim();
    var pw = document.getElementById('loginPw').value;
    var remember = document.getElementById('rememberMe').checked;
    
    var user = users.find(function(u){return u.phone === phone && u.pw === pw});
    if (user) {
        currentUser = user;
        if (remember) {
            localStorage.setItem('yoga_current_user', JSON.stringify(user));
        }
        showMemberUI();
    } else {
        document.getElementById('loginError').innerText = '帳號或密碼錯誤';
    }
}

function checkAutoLogin() {
    var saved = localStorage.getItem('yoga_current_user');
    if (saved) {
        try {
            var user = JSON.parse(saved);
            if (users.some(function(u){return u.id === user.id})) {
                currentUser = user;
                showMemberUI();
                return;
            }
        } catch(e) {}
    }
    showLoginTab();
}

function logout() {
    currentUser = null;
    localStorage.removeItem('yoga_current_user');
    showLoginTab();
}

function doTeacherLogin() {
    var id = document.getElementById('teacherId').value;
    var pw = document.getElementById('teacherPw').value;
    
    if (id === 'teacher' && pw === 'yoga9527') {
        renderTeacherUI();
        showTab('teacher');
    } else {
        alert('帳號或密碼錯誤');
    }
}

function renderDateOptions() {
    var dates = [];
    var d = new Date();
    while (dates.length < 12) {
        if (d.getDay() === 5) dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate() + 1);
    }
    var opt = '';
    dates.forEach(function(x) {
        var dd = new Date(x);
        opt += '<option value="' + x + '">' + (dd.getMonth()+1) + '/' + dd.getDate() + ' (五)</option>';
    });
    document.getElementById('bookDate').innerHTML = opt;
}

function renderCourses() {
    var html = '';
    courses.forEach(function(c) {
        // 顯示第一個週五的剩餘名額
        var d = new Date();
        while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
        var nextFri = d.toISOString().split('T')[0];
        var booked = bookings.filter(function(b){return b.courseId===c.id && b.date===nextFri && b.status!=='cancelled'}).length;
        var remain = c.capacity - booked;
        
        html += '<div class="course-card">';
        html += '<div class="name">' + c.name + '</div>';
        html += '<div class="info">👩‍🏫 ' + c.teacher + ' | ⏰ ' + c.time + '</div>';
        html += '<div class="bottom">';
        html += '<span class="capacity">名額 ' + remain + '/' + c.capacity + '</span>';
        html += '<button onclick="goToBook(' + c.id + ')">預約</button>';
        html += '</div></div>';
    });
    document.getElementById('courseList').innerHTML = html;
}

function goToBook(courseId) {
    selectedCourseId = courseId;
    var course = courses.find(function(c){return c.id === courseId});
    
    document.getElementById('bookCourseName').innerText = course.name + ' - ' + course.teacher;
    document.getElementById('bookName').innerText = currentUser.name;
    document.getElementById('bookPhone').innerText = currentUser.phone;
    document.getElementById('bookError').innerText = '';
    
    showTab('book');
}

function confirmBooking() {
    var course = courses.find(function(c){return c.id === selectedCourseId});
    var date = document.getElementById('bookDate').value;
    
    if (bookings.some(function(b){return b.phone===currentUser.phone && b.courseId===selectedCourseId && b.date===date && b.status!=='cancelled'})) {
        document.getElementById('bookError').innerText = '您已預約過此課程';
        return;
    }
    
    var booked = bookings.filter(function(b){return b.courseId===selectedCourseId && b.date===date && b.status!=='cancelled'}).length;
    if (booked >= course.capacity) {
        document.getElementById('bookError').innerText = '名額已滿';
        return;
    }
    
    bookings.push({
        id:Date.now(),
        courseId:selectedCourseId,
        courseName:course.name,
        teacher:course.teacher,
        date:date,
        time:course.time,
        name:currentUser.name,
        phone:currentUser.phone,
        status:'confirmed'
    });
    saveData();
    alert('預約成功！');
    showTab('my');
    renderMyBookings();
}

function renderMyBookings() {
    var my = bookings.filter(function(b){return b.phone === currentUser.phone}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var html = '';
    if (!my.length) {
        html = '<p style="text-align:center;color:#a4133c">尚無預約</p>';
    } else {
        my.forEach(function(b) {
            if (b.status !== 'cancelled') {
                html += '<div class="booking-card">';
                html += '<div class="date">📅 ' + b.date + ' ' + b.time + '</div>';
                html += '<div>' + b.courseName + ' - ' + b.teacher + '</div>';
                html += '<button onclick="cancelBooking(' + b.id + ')" style="background:#ff8fab;color:white;border:none;padding:8px 15px;border-radius:15px;margin-top:10px">取消預約</button>';
                html += '</div>';
            }
        });
    }
    document.getElementById('myBookingList').innerHTML = html;
}

function cancelBooking(id) {
    if (confirm('確定取消？')) {
        var b = bookings.find(function(x){return x.id === id});
        if (b) { b.status = 'cancelled'; saveData(); renderMyBookings(); }
    }
}

function renderTeacherUI() {
    var mhtml = '';
    if (!users.length) {
        mhtml = '<p style="text-align:center;color:#a4133c">尚無會員</p>';
    } else {
        users.forEach(function(u) {
            mhtml += '<div class="member-item">';
            mhtml += '<span><b>' + u.name + '</b> (' + u.phone + ')</span>';
            mhtml += '<button onclick="deleteMember(' + u.id + ')">刪除</button>';
            mhtml += '</div>';
        });
    }
    document.getElementById('teacherMembers').innerHTML = mhtml;
    
    var bhtml = '';
    var all = bookings.filter(function(b){return b.status !== 'cancelled'}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    if (!all.length) {
        bhtml = '<p style="text-align:center;color:#a4133c">尚無預約</p>';
    } else {
        all.forEach(function(b) {
            bhtml += '<div class="booking-card">';
            bhtml += '<div class="date">📅 ' + b.date + ' ' + b.time + '</div>';
            bhtml += '<div><b>' + b.name + '</b> (' + b.phone + ')</div>';
            bhtml += '<div>' + b.courseName + ' - ' + b.teacher + '</div>';
            bhtml += '<button onclick="deleteBooking(' + b.id + ')" style="background:#ff8fab;color:white;border:none;padding:8px 15px;border-radius:15px;margin-top:10px">刪除</button>';
            bhtml += '</div>';
        });
    }
    document.getElementById('teacherBookings').innerHTML = bhtml;
}

function deleteMember(id) {
    if (confirm('刪除此會員？')) {
        var u = users.find(function(x){return x.id === id});
        users = users.filter(function(x){return x.id !== id});
        bookings = bookings.filter(function(b){return b.phone !== u.phone});
        saveData();
        renderTeacherUI();
    }
}

function deleteBooking(id) {
    if (confirm('刪除此預約？')) {
        bookings = bookings.filter(function(b){return b.id !== id});
        saveData();
        renderTeacherUI();
    }
}

init();
</script>
</body>
</html>
