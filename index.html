<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 瑜伽預約 - Pink Yoga</title>
    <style>
        :root {
            --primary: #ff8fab;
            --primary-dark: #fb6f92;
            --secondary: #ffc2d1;
            --bg: #ffe5ec;
            --white: #fff0f3;
            --text: #590d22;
            --text-light: #a4133c;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ff8fab 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 36px;
            color: var(--text);
            margin-bottom: 10px;
        }
        .header p {
            color: var(--text-light);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 20px rgba(251, 111, 146, 0.4);
        }
        .tab:hover:not(.active) {
            background: var(--secondary);
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(164, 19, 60, 0.15);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--secondary);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: var(--white);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 143, 171, 0.2);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(251, 111, 146, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(251, 111, 146, 0.5);
        }
        .success {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .success h2 {
            color: var(--primary-dark);
            margin-bottom: 10px;
        }
        .bookings-table {
            width: 100%;
            border-collapse: collapse;
        }
        .bookings-table th, .bookings-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--secondary);
        }
        .bookings-table th {
            color: var(--text-light);
            font-weight: 600;
        }
        .bookings-table tr:hover {
            background: var(--white);
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.pending {
            background: #fff3cd;
            color: #856404;
        }
        .status.confirmed {
            background: #d4edda;
            color: #155724;
        }
        .status.completed {
            background: #d1ecf1;
            color: #0c5460;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-light);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
        .date-picker {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .date-btn {
            padding: 10px;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-btn:hover, .date-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .date-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 瑜伽預約</h1>
            <p>預約屬於你的放鬆時光</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('book')">預約</button>
            <button class="tab" onclick="switchTab('manage')">管理</button>
        </div>
        
        <!-- 預約表單 -->
        <div id="book" class="tab-content active">
            <div class="card">
                <form id="bookingForm">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="name" required placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label>電話</label>
                        <input type="tel" name="phone" required placeholder="請輸入電話">
                    </div>
                    <div class="form-group">
                        <label>LINE ID（選填）</label>
                        <input type="text" name="line" placeholder="方便聯繫">
                    </div>
                    <div class="form-group">
                        <label>選擇課程</label>
                        <select name="course" required>
                            <option value="">請選擇課程</option>
                            <option value="hatha">🧘 哈達瑜伽 (Hatha)</option>
                            <option value="vinyasa">💃 流動瑜伽 (Vinyasa)</option>
                            <option value="yin">🌙 陰瑜伽 (Yin)</option>
                            <option value="hot">🔥 熱瑜伽 (Hot Yoga)</option>
                            <option value="restorative">🧸 修復瑜伽 (Restorative)</option>
                            <option value="pilates">💪 皮拉提斯 (Pilates)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>選擇日期</label>
                        <input type="date" name="date" id="datePicker" required>
                    </div>
                    <div class="form-group">
                        <label>選擇時段</label>
                        <select name="time" required>
                            <option value="">請選擇時段</option>
                            <option value="09:00">🌅 早上 9:00</option>
                            <option value="10:30">☀️ 早上 10:30</option>
                            <option value="14:00">🌤️ 下午 2:00</option>
                            <option value="16:00">🌇 下午 4:00</option>
                            <option value="19:00">🌆 晚上 7:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>備註</label>
                        <textarea name="note" rows="3" placeholder="有任何特殊需求嗎？"></textarea>
                    </div>
                    <button type="submit">🌸 確認預約</button>
                </form>
                
                <div class="success" id="successMessage">
                    <div class="success-icon">🎉</div>
                    <h2>預約成功！</h2>
                    <p>我們會盡快與您聯繫確認</p>
                </div>
            </div>
        </div>
        
        <!-- 管理後台 -->
        <div id="manage" class="tab-content">
            <div class="card">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalBookings">0</div>
                        <div class="stat-label">總預約</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="todayBookings">0</div>
                        <div class="stat-label">今日預約</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="weekBookings">0</div>
                        <div class="stat-label">本週預約</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <input type="text" id="searchInput" placeholder="🔍 搜尋預約..." oninput="filterBookings()">
                </div>
                
                <table class="bookings-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>姓名</th>
                            <th>課程</th>
                            <th>時間</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTable">
                    </tbody>
                </table>
                
                <div class="empty-state" id="emptyState">
                    <p>目前沒有預約紀錄</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        const STORAGE_KEY = 'yoga_bookings';
        let bookings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        
        // 設定最低日期
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').setAttribute('min', today);
        
        // 切換標籤
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'manage') {
                renderBookings();
            }
        }
        
        // 提交表單
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const booking = {
                id: Date.now(),
                name: formData.get('name'),
                phone: formData.get('phone'),
                line: formData.get('line') || '',
                course: formData.get('course'),
                date: formData.get('date'),
                time: formData.get('time'),
                note: formData.get('note') || '',
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            bookings.push(booking);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
            
            this.style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            
            setTimeout(() => {
                this.reset();
                this.style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        });
        
        // 渲染預約列表
        function renderBookings() {
            const tbody = document.getElementById('bookingsTable');
            const emptyState = document.getElementById('emptyState');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = bookings.filter(b => 
                b.name.toLowerCase().includes(searchTerm) ||
                b.phone.includes(searchTerm) ||
                b.date.includes(searchTerm)
            ).sort((a, b) => new Date(a.date) - new Date(b.date));
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                tbody.innerHTML = filtered.map(b => `
                    <tr>
                        <td>${b.date}</td>
                        <td>${b.name}<br><small>${b.phone}</small></td>
                        <td>${getCourseName(b.course)}</td>
                        <td>${b.time}</td>
                        <td><span class="status ${b.status}">${getStatusName(b.status)}</span></td>
                        <td>
                            <button onclick="updateStatus(${b.id}, 'confirmed')" style="padding:5px 10px;font-size:12px;width:auto;">確認</button>
                            <button onclick="updateStatus(${b.id}, 'completed')" style="padding:5px 10px;font-size:12px;width:auto;background:#aaa;">完成</button>
                            <button onclick="deleteBooking(${b.id})" style="padding:5px 10px;font-size:12px;width:auto;background:#ff6b6b;">刪除</button>
                        </td>
                    </tr>
                `).join('');
            }
            
            updateStats();
        }
        
        // 更新統計
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const weekEnd = new Date();
            weekEnd.setDate(weekEnd.getDate() + 7);
            
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('todayBookings').textContent = bookings.filter(b => b.date === today).length;
            document.getElementById('weekBookings').textContent = bookings.filter(b => b.date >= today && b.date <= weekEnd.toISOString().split('T')[0]).length;
        }
        
        // 搜尋
        function filterBookings() {
            renderBookings();
        }
        
        // 更新狀態
        function updateStatus(id, status) {
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                bookings[index].status = status;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
                renderBookings();
            }
        }
        
        // 刪除預約
        function deleteBooking(id) {
            if (confirm('確定要刪除這筆預約嗎？')) {
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
                renderBookings();
            }
        }
        
        // 課程名稱
        function getCourseName(course) {
            const courses = {
                'hatha': '🧘 哈達瑜伽',
                'vinyasa': '💃 流動瑜伽',
                'yin': '🌙 陰瑜伽',
                'hot': '🔥 熱瑜伽',
                'restorative': '🧸 修復瑜伽',
                'pilates': '💪 皮拉提斯'
            };
            return courses[course] || course;
        }
        
        // 狀態名稱
        function getStatusName(status) {
            const statuses = {
                'pending': '待確認',
                'confirmed': '已確認',
                'completed': '已完成'
            };
            return statuses[status] || status;
        }
    </script>
</body>
</html>
