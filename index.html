<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九容瑜伽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            color: #5a3a3a;
        }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.2);
        }
        
        h1 { text-align: center; color: #ff6b8f; font-size: 28px; margin-bottom: 5px; }
        h2 { color: #ff6b8f; margin-bottom: 15px; text-align: center; }
        p { text-align: center; color: #8a6a6a; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffc2d1;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #ff6b8f;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav button { flex: 1; }
        .nav .active { background: #ff4777; }
        
        .course { 
            background: #fff0f3; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 10px;
            border-left: 4px solid #ff6b8f;
        }
        .course-name { font-weight: bold; color: #ff6b8f; font-size: 18px; }
        .course-info { color: #8a6a6a; font-size: 14px; margin: 5px 0; }
        .course-btn { 
            background: #ff6b8f; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 20px; 
            margin-top: 10px;
            font-weight: bold;
        }
        
        .booking { 
            background: #fff0f3; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 10px; 
        }
        .booking-date { font-weight: bold; color: #ff6b8f; }
        
        .tab-btn {
            background: white;
            color: #ff6b8f;
            border: 2px solid #ff6b8f;
        }
        
        .footer { text-align: center; margin-top: 20px; }
        .footer button { width: auto; padding: 12px 30px; }
        
        .link { color: #ff6b8f; text-decoration: underline; cursor: pointer; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tabs button { flex: 1; background: #ffc2d1; color: #ff6b8f; }
        .tabs .active { background: #ff6b8f; color: white; }
        
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #ffe5ec;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入頁面 -->
        <div id="page-login">
            <div class="card">
                <h1>🧘 九容瑜伽</h1>
                <p>動若雲，靜若水，身隨意，境隨心。</p>
            </div>
            <div class="card">
                <h2>🔐 會員登入</h2>
                <input type="text" id="loginPhone" placeholder="手機號碼">
                <input type="password" id="loginPw" placeholder="密碼">
                <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                    <input type="checkbox" id="remember"> 記住登入
                </label>
                <button onclick="login()">登入</button>
                <p style="margin-top:15px">
                    還沒帳號？<span class="link" onclick="showRegister()">立即註冊</span>
                </p>
            </div>
            <div class="card">
                <p>老師專區</p>
                <button class="tab-btn" onclick="showTeacherLogin()">老師入口</button>
            </div>
        </div>
        
        <!-- 註冊頁面 -->
        <div id="page-register" style="display:none">
            <div class="card">
                <h2>✨ 註冊會員</h2>
                <input type="text" id="regName" placeholder="姓名">
                <input type="text" id="regPhone" placeholder="手機號碼">
                <input type="password" id="regPw" placeholder="密碼">
                <button onclick="register()">註冊</button>
                <p style="margin-top:15px">
                    已有帳號？<span class="link" onclick="showLogin()">立即登入</span>
                </p>
            </div>
        </div>
        
        <!-- 學員首頁 -->
        <div id="page-home" style="display:none">
            <div class="card">
                <h1>🧘 九容瑜伽</h1>
                <div class="nav">
                    <button class="active" onclick="showTab('courses')">課程</button>
                    <button onclick="showTab('my')">我的</button>
                </div>
            </div>
            
            <div id="tab-courses">
                <div id="courseList"></div>
            </div>
            
            <div id="tab-my" style="display:none">
                <div id="myList"></div>
            </div>
            
            <div class="footer">
                <button onclick="logout()">登出</button>
            </div>
        </div>
        
        <!-- 預約頁面 -->
        <div id="page-book" style="display:none">
            <div class="card">
                <h2>📝 預約報名</h2>
                <div id="bookInfo"></div>
                <select id="bookDate"></select>
                <button onclick="confirmBook()">確認預約</button>
                <button class="tab-btn" onclick="showPage('home')" style="margin-top:10px">返回</button>
            </div>
        </div>
        
        <!-- 老師登入 -->
        <div id="page-teacher-login" style="display:none">
            <div class="card">
                <h2>👩‍🏫 老師登入</h2>
                <input type="text" id="teacherId" value="teacher">
                <input type="password" id="teacherPw" placeholder="密碼">
                <button onclick="teacherLogin()">登入</button>
                <button class="tab-btn" onclick="showPage('login')" style="margin-top:10px">返回</button>
            </div>
        </div>
        
        <!-- 老師後台 -->
        <div id="page-teacher" style="display:none">
            <div class="card">
                <h2>👩‍🏫 老師後台</h2>
                <div class="tabs">
                    <button class="active" onclick="showTeacherTab('members')">會員</button>
                    <button onclick="showTeacherTab('bookings')">預約</button>
                    <button onclick="showTeacherTab('courses')">課程</button>
                </div>
                <div id="teacherMembers"></div>
                <div id="teacherBookings" style="display:none"></div>
                <div id="teacherCourses" style="display:none"></div>
            </div>
            <div class="footer">
                <button onclick="logout()">登出</button>
            </div>
        </div>
    </div>

<script>
// 資料
var users = [];
var bookings = [];
var courses = [];
var currentUser = null;
var selectCourseId = null;

// 初始化
function init() {
    loadData();
    checkLogin();
}

function loadData() {
    try {
        users = JSON.parse(localStorage.getItem('yoga_users')) || [];
        bookings = JSON.parse(localStorage.getItem('yoga_bookings')) || [];
        courses = JSON.parse(localStorage.getItem('yoga_courses')) || [];
        if (courses.length === 0) {
            courses = [{id:1, name:'基礎瑜伽', teacher:'小怡老師', time:'15:00', capacity:8}];
            saveData();
        }
    } catch(e) {
        courses = [{id:1, name:'基礎瑜伽', teacher:'小怡老師', time:'15:00', capacity:8}];
    }
}

function saveData() {
    localStorage.setItem('yoga_users', JSON.stringify(users));
    localStorage.setItem('yoga_bookings', JSON.stringify(bookings));
    localStorage.setItem('yoga_courses', JSON.stringify(courses));
}

// 頁面切換
function showPage(page) {
    var pages = ['login', 'register', 'home', 'book', 'teacher-login', 'teacher'];
    pages.forEach(function(p) {
        document.getElementById('page-' + p).style.display = 'none';
    });
    document.getElementById('page-' + page).style.display = 'block';
}

function showRegister() { showPage('register'); }
function showLogin() { showPage('login'); }

function showTeacherLogin() { showPage('teacher-login'); }

function showTab(tab) {
    document.querySelectorAll('.nav button').forEach(function(b, i) {
        b.classList.toggle('active', (tab === 'courses' && i === 0) || (tab === 'my' && i === 1));
    });
    document.getElementById('tab-courses').style.display = tab === 'courses' ? 'block' : 'none';
    document.getElementById('tab-my').style.display = tab === 'my' ? 'block' : 'none';
    if (tab === 'my') renderMyBookings();
}

function showTeacherTab(tab) {
    document.querySelectorAll('.tabs button').forEach(function(b, i) {
        b.classList.toggle('active', (tab === 'members' && i === 0) || (tab === 'bookings' && i === 1) || (tab === 'courses' && i === 2));
    });
    document.getElementById('teacherMembers').style.display = tab === 'members' ? 'block' : 'none';
    document.getElementById('teacherBookings').style.display = tab === 'bookings' ? 'block' : 'none';
    document.getElementById('teacherCourses').style.display = tab === 'courses' ? 'block' : 'none';
    if (tab === 'courses') renderTeacherCourses();
}

// 註冊
function register() {
    var name = document.getElementById('regName').value.trim();
    var phone = document.getElementById('regPhone').value.trim();
    var pw = document.getElementById('regPw').value;
    
    if (!name || !phone || !pw) { alert('請填寫完整'); return; }
    if (users.some(function(u){return u.phone === phone})) { alert('手機已註冊'); return; }
    
    users.push({id:Date.now(), name:name, phone:phone, pw:pw});
    saveData();
    alert('註冊成功！請登入');
    showLogin();
}

// 登入
function login() {
    var phone = document.getElementById('loginPhone').value.trim();
    var pw = document.getElementById('loginPw').value;
    var remember = document.getElementById('remember').checked;
    
    var user = users.find(function(u){return u.phone === phone && u.pw === pw});
    if (user) {
        currentUser = user;
        if (remember) localStorage.setItem('yoga_current', JSON.stringify(user));
        showPage('home');
        renderCourses();
    } else {
        alert('帳號或密碼錯誤');
    }
}

// 檢查登入
function checkLogin() {
    var saved = localStorage.getItem('yoga_current');
    if (saved) {
        try {
            var user = JSON.parse(saved);
            if (users.some(function(u){return u.id === user.id})) {
                currentUser = user;
                showPage('home');
                renderCourses();
                return;
            }
        } catch(e) {}
    }
    showPage('login');
}

// 登出
function logout() {
    currentUser = null;
    localStorage.removeItem('yoga_current');
    showPage('login');
}

// 老師登入
function teacherLogin() {
    var id = document.getElementById('teacherId').value;
    var pw = document.getElementById('teacherPw').value;
    if (id === 'teacher' && pw === 'yoga9527') {
        renderTeacher();
        showPage('teacher');
    } else {
        alert('帳號或密碼錯誤');
    }
}

// 取得週五日期
function getFridays() {
    var dates = [];
    var d = new Date();
    while (dates.length < 12) {
        if (d.getDay() === 5) dates.push(d.toISOString().split('T')[0]);
        d.setDate(d.getDate() + 1);
    }
    return dates;
}

// 渲染課程
function renderCourses() {
    var dates = getFridays();
    var nextFri = dates[0];
    
    var html = '';
    courses.forEach(function(c) {
        var booked = bookings.filter(function(b){return b.courseId === c.id && b.date === nextFri && b.status !== 'cancelled'}).length;
        var remain = c.capacity - booked;
        
        html += '<div class="course">';
        html += '<div class="course-name">' + c.name + '</div>';
        html += '<div class="course-info">👩‍🏫 ' + c.teacher + ' | ⏰ ' + (c.time || '15:00') + '</div>';
        html += '<div class="course-info">名額 ' + c.capacity + ' 員</div>';
        if (remain > 0) {
            html += '<button class="course-btn" onclick="goBook(' + c.id + ')">預約</button>';
        }
        html += '</div>';
    });
    document.getElementById('courseList').innerHTML = html;
}

// 去預約
function goBook(courseId) {
    selectCourseId = courseId;
    var course = courses.find(function(c){return c.id === courseId});
    
    var html = '<div class="course"><div class="course-name">' + course.name + '</div>';
    html += '<div class="course-info">👩‍🏫 ' + course.teacher + ' | ⏰ ' + (course.time || '15:00') + '</div></div>';
    document.getElementById('bookInfo').innerHTML = html;
    
    var dates = getFridays();
    var opt = '';
    dates.forEach(function(d) {
        var dd = new Date(d);
        opt += '<option value="' + d + '">' + (dd.getMonth()+1) + '/' + dd.getDate() + ' (五)</option>';
    });
    document.getElementById('bookDate').innerHTML = opt;
    
    // 顯示剩餘名額
    updateRemaining();
    document.getElementById('bookDate').onchange = updateRemaining;
    
    showPage('book');
}

function updateRemaining() {
    var course = courses.find(function(c){return c.id === selectCourseId});
    var date = document.getElementById('bookDate').value;
    var booked = bookings.filter(function(b){return b.courseId === selectCourseId && b.date === date && b.status !== 'cancelled'}).length;
    var remain = course.capacity - booked;
    
    var info = document.getElementById('bookInfo');
    info.innerHTML = '<div class="course"><div class="course-name">' + course.name + '</div>';
    info.innerHTML += '<div class="course-info">👩‍🏫 ' + course.teacher + ' | ⏰ ' + course.time + '</div>';
    info.innerHTML += '<div class="course-info" style="color:#ff6b8f;font-weight:bold">剩餘名額: ' + remain + ' 員</div></div>';
}

// 確認預約
function confirmBook() {
    var course = courses.find(function(c){return c.id === selectCourseId});
    var date = document.getElementById('bookDate').value;
    
    if (bookings.some(function(b){return b.phone === currentUser.phone && b.courseId === selectCourseId && b.date === date && b.status !== 'cancelled'})) {
        alert('您已預約過');
        return;
    }
    
    var booked = bookings.filter(function(b){return b.courseId === selectCourseId && b.date === date && b.status !== 'cancelled'}).length;
    if (booked >= course.capacity) { alert('名額已滿'); return; }
    
    bookings.push({
        id: Date.now(),
        courseId: course.id,
        courseName: course.name,
        teacher: course.teacher,
        date: date,
        time: course.time,
        name: currentUser.name,
        phone: currentUser.phone,
        status: 'confirmed'
    });
    saveData();
    alert('預約成功！');
    showTab('my');
}

// 我的預約
function renderMyBookings() {
    var my = bookings.filter(function(b){return b.phone === currentUser.phone && b.status !== 'cancelled'}).sort(function(a,b){return new Date(b.date) - new Date(a.date)});
    var html = '';
    if (my.length === 0) {
        html = '<p style="text-align:center;color:#8a6a6a">尚無預約</p>';
    } else {
        my.forEach(function(b) {
            html += '<div class="booking">';
            html += '<div class="booking-date">📅 ' + b.date + ' ' + (b.time || '15:00') + '</div>';
            html += '<div>' + b.courseName + ' - ' + b.teacher + '</div>';
            html += '<button class="course-btn" onclick="cancelBook(' + b.id + ')" style="background:#ff4777;margin-top:8px">取消預約</button>';
            html += '</div>';
        });
    }
    document.getElementById('myList').innerHTML = html;
}

function cancelBook(id) {
    if (confirm('確定取消？')) {
        var b = bookings.find(function(x){return x.id === id});
        if (b) { b.status = 'cancelled'; saveData(); renderMyBookings(); }
    }
}

// 老師後台
function renderTeacher() {
    // 會員
    var mhtml = '';
    if (users.length === 0) {
        mhtml = '<p style="text-align:center;color:#8a6a6a">尚無會員</p>';
    } else {
        users.forEach(function(u) {
            mhtml += '<div class="member-item">';
            mhtml += '<span><b>' + u.name + '</b> (' + u.phone + ')</span>';
            mhtml += '<button class="course-btn" onclick="delMember(' + u.id + ')" style="background:#ff4777;width:auto;padding:8px 15px">刪除</button>';
            mhtml += '</div>';
        });
    }
    document.getElementById('teacherMembers').innerHTML = mhtml;
    
    // 預約 - 按課程分組
    var bhtml = '';
    var all = bookings.filter(function(b){return b.status !== 'cancelled'});
    
    // 按課程+日期分組
    var grouped = {};
    all.forEach(function(b) {
        var key = b.courseId + '_' + b.date;
        if (!grouped[key]) {
            grouped[key] = {courseName:b.courseName, teacher:b.teacher, date:b.date, time:b.time, students:[]};
        }
        grouped[key].students.push(b);
    });
    
    if (all.length === 0) {
        bhtml = '<p style="text-align:center;color:#8a6a6a">尚無預約</p>';
    } else {
        Object.keys(grouped).forEach(function(key) {
            var g = grouped[key];
            var studentCount = g.students.length;
            bhtml += '<div class="booking" onclick="toggleStudents(\'' + key + '\')" style="cursor:pointer">';
            bhtml += '<div class="booking-date">📅 ' + g.date + ' ' + g.time + '</div>';
            bhtml += '<div><b>' + g.courseName + '</b> - ' + g.teacher + '</div>';
            bhtml += '<div style="color:#ff6b8f">👥 ' + studentCount + ' 人預約 ▼</div>';
            bhtml += '<div id="students-' + key + '" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #ffe5ec">';
            g.students.forEach(function(s) {
                bhtml += '<div style="padding:8px;background:#fff0f3;border-radius:8px;margin-bottom:5px">';
                bhtml += '<b>' + s.name + '</b> (' + s.phone + ')';
                bhtml += '</div>';
            });
            bhtml += '</div>';
            bhtml += '</div>';
        });
    }
    document.getElementById('teacherBookings').innerHTML = bhtml;
}

function delMember(id) {
    if (confirm('刪除此會員？')) {
        var u = users.find(function(x){return x.id === id});
        users = users.filter(function(x){return x.id !== id});
        bookings = bookings.filter(function(b){return b.phone !== u.phone});
        saveData();
        renderTeacher();
    }
}

function delBooking(id) {
    if (confirm('刪除此預約？')) {
        bookings = bookings.filter(function(b){return b.id !== id});
        saveData();
        renderTeacher();
    }
}

function toggleStudents(key) {
    var el = document.getElementById('students-' + key);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function renderTeacherCourses() {
    var chtml = '';
    chtml += '<div style="margin-bottom:15px">';
    chtml += '<h3 style="color:#ff6b8f;margin-bottom:10px">新增課程</h3>';
    chtml += '<input type="text" id="newCourseName" placeholder="課程名稱" style="margin-bottom:8px">';
    chtml += '<input type="text" id="newCourseTeacher" placeholder="老師名稱" style="margin-bottom:8px">';
    chtml += '<input type="text" id="newCourseTime" placeholder="時間 (如 15:00)" style="margin-bottom:8px">';
    chtml += '<input type="number" id="newCourseCapacity" placeholder="名額" value="8" style="margin-bottom:8px">';
    chtml += '<button onclick="addCourse()" style="margin-bottom:15px">新增課程</button>';
    chtml += '</div>';
    
    chtml += '<h3 style="color:#ff6b8f;margin-bottom:10px">現有課程</h3>';
    if (courses.length === 0) {
        chtml += '<p style="color:#8a6a6a">尚無課程</p>';
    } else {
        courses.forEach(function(c) {
            chtml += '<div class="member-item">';
            chtml += '<span><b>' + c.name + '</b> - ' + c.teacher + ' (' + (c.time || '15:00') + ', ' + c.capacity + '人)</span>';
            chtml += '<button onclick="delCourse(' + c.id + ')" style="background:#ff4777;width:auto;padding:5px 10px;font-size:12px">刪除</button>';
            chtml += '</div>';
        });
    }
    document.getElementById('teacherCourses').innerHTML = chtml;
}

function addCourse() {
    var name = document.getElementById('newCourseName').value.trim();
    var teacher = document.getElementById('newCourseTeacher').value.trim();
    var time = document.getElementById('newCourseTime').value.trim();
    var capacity = parseInt(document.getElementById('newCourseCapacity').value) || 8;
    
    if (!name || !teacher || !time) { alert('請填寫課程名稱、老師、時間'); return; }
    
    courses.push({id:Date.now(), name:name, teacher:teacher, time:time, capacity:capacity});
    saveData();
    
    document.getElementById('newCourseName').value = '';
    document.getElementById('newCourseTeacher').value = '';
    document.getElementById('newCourseTime').value = '';
    
    alert('課程已新增！');
    renderTeacherCourses();
}

function delCourse(id) {
    if (confirm('刪除此課程？')) {
        courses = courses.filter(function(c){return c.id !== id});
        saveData();
        renderTeacherCourses();
    }
}

init();
</script>
</body>
</html>
